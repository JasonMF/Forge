<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forge — AI Career Copilot for ITHS Students</title>
    <meta name="description" content="Forge is an AI-powered career copilot built for Information Technology High School students. Get personalized 12-week roadmaps, auto-generated portfolios, and an AI mentor.">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔨</text></svg>">
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import * as LucideReact from 'https://esm.sh/lucide-react@0.263.1';
        window.lucideReact = LucideReact;
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; }
    </style>
</head>
<body class="bg-[#08080C] text-white">
    <div id="root"></div>

    <script type="text/babel">
        const { 
            useState, useEffect, useRef, useCallback, useMemo, Fragment
        } = React;

        const {
            ArrowRight,
            ArrowLeft,
            Flame,
            Sparkles,
            Target,
            Trophy,
            Check,
            Github,
            Hammer,
            Zap,
            Compass,
            Rocket,
            Copy,
            ChevronRight,
            CircleDot,
            Lock,
            User,
            LogOut,
            Settings,
            Code2,
            Brain,
            Shield,
            Gamepad2,
            PenTool,
            Layers,
            Wand2,
            MessageSquare,
            Activity,
            Clock,
            GraduationCap,
            Briefcase,
            DollarSign,
            BookOpen,
        } = window.lucideReact;

        /* ────────────────────────────────────────────────────────────────────────────
           FORGE — AI-powered career copilot for ITHS students
           Built for the "Make ITHS Better" Hackathon 2026
           ──────────────────────────────────────────────────────────────────────────── */

        /* ── AI Service Layer ───────────────────────────────────────────────────────── */
        // Runtime-loaded keys live in localStorage so they're never embedded in source.
        // Use the "Connect AI" panel (top-right of dashboard) to add/swap keys.
        const AI_CONFIG = {
          // Default Gemini model — Gemini 2.5 Flash is smarter than 2.0 with similar speed.
          geminiModel: 'gemini-2.5-flash',
          openaiModel: 'gpt-4o-mini',
          openaiUrl: 'https://api.openai.com/v1/chat/completions',
        };
        const geminiUrl = (model) => `https://generativelanguage.googleapis.com/v1beta/models/${model || AI_CONFIG.geminiModel}:generateContent`;

        const AI_KEYS = {
          get gemini() { return localStorage.getItem('forge_ai_gemini') || ''; },
          set gemini(v) { localStorage.setItem('forge_ai_gemini', v || ''); },
          get openai() { return localStorage.getItem('forge_ai_openai') || ''; },
          set openai(v) { localStorage.setItem('forge_ai_openai', v || ''); },
        };

        // Live AI status — read by the dashboard pill so the user sees what's actually firing.
        const AI_STATUS = {
          provider: null,        // 'gemini' | 'openai' | 'fallback'
          lastError: null,       // string | null
          lastSuccessAt: 0,
          subs: new Set(),
          set(provider, lastError = null) {
            this.provider = provider;
            this.lastError = lastError;
            if (provider !== 'fallback') this.lastSuccessAt = Date.now();
            this.subs.forEach(fn => { try { fn({ provider, lastError, lastSuccessAt: this.lastSuccessAt }); } catch {} });
          },
          subscribe(fn) { this.subs.add(fn); return () => this.subs.delete(fn); },
        };

        const callAI = async (prompt, systemPrompt = '') => {
          const sys = systemPrompt || 'You are Forge AI, a career mentor built for students at Information Technology High School (ITHS) in Long Island City, NYC. You give specific, actionable advice about tech careers, college prep, portfolio building, and skill development. Be encouraging but direct. Keep responses concise (2-4 sentences unless asked for more).';

          if (AI_KEYS.gemini) {
            try {
              const res = await fetch(`${geminiUrl()}?key=${AI_KEYS.gemini}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                  system_instruction: { parts: [{ text: sys }] },
                  contents: [{ parts: [{ text: prompt }] }],
                  generationConfig: { temperature: 0.8, maxOutputTokens: 1024 },
                }),
              });
              if (!res.ok) {
                const errText = await res.text().catch(() => '');
                throw new Error(`Gemini ${res.status}: ${errText.slice(0, 120)}`);
              }
              const data = await res.json();
              const text = data.candidates?.[0]?.content?.parts?.[0]?.text;
              if (text) { AI_STATUS.set('gemini'); return text; }
              throw new Error('Gemini returned empty body');
            } catch (e) { console.warn('Gemini error:', e); AI_STATUS.set('fallback', String(e.message || e)); }
          }
          if (AI_KEYS.openai) {
            try {
              const res = await fetch(AI_CONFIG.openaiUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${AI_KEYS.openai}` },
                body: JSON.stringify({
                  model: AI_CONFIG.openaiModel,
                  messages: [{ role: 'system', content: sys }, { role: 'user', content: prompt }],
                  max_tokens: 1024, temperature: 0.8,
                }),
              });
              if (!res.ok) {
                const errText = await res.text().catch(() => '');
                throw new Error(`OpenAI ${res.status}: ${errText.slice(0, 120)}`);
              }
              const data = await res.json();
              const text = data.choices?.[0]?.message?.content;
              if (text) { AI_STATUS.set('openai'); return text; }
              throw new Error('OpenAI returned empty body');
            } catch (e) { console.warn('OpenAI error:', e); AI_STATUS.set('fallback', String(e.message || e)); }
          }
          AI_STATUS.set('fallback', AI_KEYS.gemini || AI_KEYS.openai ? AI_STATUS.lastError : 'No API key configured');
          return smartMockResponse(prompt);
        };

        /* Robust JSON extractor — returns null instead of throwing when input isn't JSON. */
        const safeParseJSON = (raw, kind /* 'array' | 'object' */) => {
          if (!raw || typeof raw !== 'string') return null;
          let s = raw.replace(/```json\s*/gi, '').replace(/```\s*/g, '').trim();
          // Strip leading prose
          if (kind === 'array') {
            const i = s.indexOf('['); const j = s.lastIndexOf(']');
            if (i === -1 || j === -1 || j < i) return null;
            s = s.slice(i, j + 1);
          } else {
            const i = s.indexOf('{'); const j = s.lastIndexOf('}');
            if (i === -1 || j === -1 || j < i) return null;
            s = s.slice(i, j + 1);
          }
          try { return JSON.parse(s); } catch { return null; }
        };

        const smartMockResponse = (prompt) => {
          const p = prompt.toLowerCase();
          if (p.includes('roadmap') || p.includes('plan') || p.includes('goal')) {
            return JSON.stringify([
              { week: 1, title: 'Foundation Sprint', task: 'Set up your dev environment, create a GitHub profile, and push your first repo with a professional README', xp: 80 },
              { week: 2, title: 'Build Something Real', task: 'Create a personal portfolio website showcasing 3 projects — deploy it live on GitHub Pages', xp: 150 },
              { week: 3, title: 'Version Control Mastery', task: 'Learn branching, pull requests, and contribute to one open-source issue on GitHub', xp: 180 },
              { week: 4, title: 'Frontend Deep Dive', task: 'Build a responsive React component library with at least 5 reusable components', xp: 200 },
              { week: 5, title: 'API Integration', task: 'Connect your project to a public API and build a data-driven feature', xp: 220 },
              { week: 6, title: 'Database Fundamentals', task: 'Add persistent storage to your app using Firebase or Supabase', xp: 240 },
              { week: 7, title: 'Auth & Security', task: 'Implement user authentication with Google/GitHub OAuth in your project', xp: 260 },
              { week: 8, title: 'Build in Public', task: 'Write a build log, share your progress on social media, and get feedback', xp: 280 },
              { week: 9, title: 'Internship Prep', task: 'Research 10 companies, tailor your resume, and send 5 outreach emails', xp: 300 },
              { week: 10, title: 'Interview Ready', task: 'Complete 5 LeetCode problems and do 2 mock behavioral interviews', xp: 320 },
              { week: 11, title: 'Portfolio Polish', task: 'Refine your top 3 projects, record demo videos, and write case studies', xp: 340 },
              { week: 12, title: 'Launch & Apply', task: 'Submit applications to 6 programs/internships and celebrate your growth', xp: 400 },
            ]);
          }
          if (p.includes('portfolio') || p.includes('github') || p.includes('bullet') || p.includes('resume')) {
            const bullets = [
              'Architected and deployed a full-stack web application using React, Node.js, and PostgreSQL — featuring real-time data sync, OAuth authentication, and CI/CD pipeline via GitHub Actions. Achieved 200+ active users within the first month through strategic community outreach.',
              'Designed and built a responsive portfolio platform with dynamic project showcases, interactive skill visualizations, and automated deployment. Leveraged modern CSS techniques including glassmorphism and micro-animations for a premium user experience.',
              'Developed an AI-powered productivity tool that generates personalized learning roadmaps using the Gemini API. Implemented a gamification system with XP tracking, streak mechanics, and achievement unlocks to drive consistent user engagement.'
            ];
            return bullets[Math.floor(Math.random() * bullets.length)];
          }
          if (p.includes('react') || p.includes('javascript') || p.includes('js')) return 'For an ITHS student, I recommend starting with React fundamentals — build 3 small projects before moving to Next.js. Focus on component thinking, state management with hooks, and API integration. Your ITHS coursework gives you a strong foundation to build on.';
          if (p.includes('python') || p.includes('learn') || p.includes('skill') || p.includes('language') || p.includes('code') || p.includes('programming')) return 'Start with Python for its versatility — it covers web dev (Django/Flask), data science, and automation. Then add JavaScript for frontend work. As an ITHS student, try building a project that combines both: a Python API backend with a React frontend.';
          if (p.includes('college') || p.includes('university') || p.includes('cornell') || p.includes('nyu')) return 'Top CS programs like Cornell Tech, NYU Tandon, and Stony Brook look for students with real projects, not just grades. Build 2-3 polished portfolio projects, contribute to open source, and write about what you learned. Your ITHS background in IT already sets you apart.';
          if (p.includes('internship') || p.includes('job') || p.includes('career') || p.includes('work')) return 'Start with local NYC startups — they love hungry ITHS students. Check AngelList, LinkedIn, and Handshake. Lead with your projects, not your GPA. A deployed app is worth more than a 4.0 to most tech companies.';
          if (p.includes('web') || p.includes('html') || p.includes('css') || p.includes('frontend') || p.includes('front')) return 'For web development, master the fundamentals first: HTML5 semantic elements, CSS Grid/Flexbox, and vanilla JavaScript. Then move to React. Build a portfolio site, a weather app, and a todo app — those three projects teach you 80% of what you need.';
          if (p.includes('ai') || p.includes('machine') || p.includes('data')) return 'AI/ML is a great career path! Start with Python, then learn NumPy and Pandas for data manipulation. Try the free Andrew Ng course on Coursera. For a quick win, build a project using the Gemini or OpenAI API — you can create something impressive in a weekend.';
          if (p.includes('cyber') || p.includes('security') || p.includes('hack')) return 'Cybersecurity is in huge demand! Start with CompTIA Security+ study materials, practice on TryHackMe or HackTheBox, and learn Linux fundamentals. NYC has amazing cybersecurity meetups — check out OWASP NYC chapter. Your ITHS network skills are a perfect foundation.';
          if (p.includes('design') || p.includes('ui') || p.includes('ux')) return 'UI/UX design is a fantastic skill to pair with development. Start with Figma (free!), study Apple and Google design guidelines, and rebuild existing apps to practice. Check out "Don\'t Make Me Think" by Steve Krug — it\'s the best intro to UX.';
          if (p.includes('game') || p.includes('unity') || p.includes('gaming')) return 'Game development is awesome! Start with Unity (C#) or Godot (free, open-source). Build 3 small games before attempting anything big: a pong clone, a platformer, and a simple RPG. Each one teaches critical concepts. Check out Brackeys on YouTube.';
          if (p.includes('help') || p.includes('what') || p.includes('how') || p.includes('should')) return 'I\'m here to help! I can give you advice on: 🎯 Career paths in tech, 📚 Learning roadmaps for any skill, 💼 Internship and job search strategies, 🏫 College prep and applications, 💻 Project ideas and portfolio tips. What area interests you most?';
          return 'Great question! As an ITHS student, you have a unique advantage — you\'re already in a tech-focused environment. Focus on building real projects, contributing to open source, and connecting with the NYC tech community. Every line of code you ship is a step closer to your goal. What specific area would you like to explore?';
        };

        const generateBullet = async (url) => {
          const prompt = `Generate a professional resume bullet point for a high school student's portfolio based on this GitHub project: ${url}. Write ONE impressive, specific bullet point (2-3 sentences) that highlights technical skills, impact, and technologies used. Make it sound like a top CS applicant wrote it.`;
          return await callAI(prompt);
        };

        /* ── Adaptive UI engine ─────────────────────────────────────────────────────── */
        const TRACKS = {
          web:       { key: 'web',       label: 'Web Development',     blurb: 'Build for the browser',          Icon: Code2,    skills: ['HTML/CSS', 'JavaScript', 'React', 'APIs'] },
          fullstack: { key: 'fullstack', label: 'Full-Stack',          blurb: 'Frontend + backend together',    Icon: Layers,   skills: ['React', 'Node', 'Postgres', 'Auth'] },
          ai:        { key: 'ai',        label: 'AI / Machine Learning', blurb: 'Models, agents, data',         Icon: Brain,    skills: ['Python', 'NumPy', 'PyTorch', 'LLM APIs'] },
          cyber:     { key: 'cyber',     label: 'Cybersecurity',       blurb: 'Defend, attack, harden',         Icon: Shield,   skills: ['Linux', 'Networking', 'CTFs', 'Security+'] },
          game:      { key: 'game',      label: 'Game Development',    blurb: 'Ship playable worlds',           Icon: Gamepad2, skills: ['Unity', 'C#', 'Godot', 'Game design'] },
          design:    { key: 'design',    label: 'UI / UX Design',      blurb: 'Pixel-craft + product thinking', Icon: PenTool,  skills: ['Figma', 'Design systems', 'Prototyping'] },
        };

        const LEVELS = {
          beginner:     { key: 'beginner',     label: 'Beginner',     blurb: 'New to this — show me the ropes',           tone: 'friendly + foundational',           xpStart: 60,  xpStep: 18 },
          intermediate: { key: 'intermediate', label: 'Intermediate', blurb: 'I\'ve shipped a few small things',          tone: 'sharper, push harder',              xpStart: 90,  xpStep: 24 },
          advanced:     { key: 'advanced',     label: 'Advanced',     blurb: 'I want stretch goals + senior expectations', tone: 'high-bar, recruiter-ready',         xpStart: 120, xpStep: 32 },
        };

        const TIME_OPTIONS = [
          { key: '5',   label: '~5 hrs / week',  blurb: 'Light pace — small daily commits' },
          { key: '10',  label: '~10 hrs / week', blurb: 'Steady — one solid project per month' },
          { key: '15+', label: '15+ hrs / week', blurb: 'Heavy — full transformation mode' },
        ];

        const OUTCOMES = {
          college:    { key: 'college',    label: 'College admissions',  blurb: 'Cornell, NYU, Stony Brook, etc.',  Icon: GraduationCap },
          internship: { key: 'internship', label: 'Internship / job',    blurb: 'Get paid to build',                Icon: Briefcase },
          portfolio:  { key: 'portfolio',  label: 'Portfolio + skills',  blurb: 'Become legitimately good',         Icon: Github },
          freelance:  { key: 'freelance',  label: 'Freelance income',    blurb: 'Make money on the side',           Icon: DollarSign },
        };

        const profileSummary = (p) => {
          if (!p) return '';
          const t = TRACKS[p.track]?.label || 'Tech';
          const l = LEVELS[p.level]?.label || 'Beginner';
          const o = OUTCOMES[p.outcome]?.label || 'Skill-building';
          const time = (TIME_OPTIONS.find(x => x.key === p.timeCommitment)?.label) || '~10 hrs / week';
          return `Track: ${t} · Level: ${l} · Time: ${time} · Outcome: ${o}`;
        };

        /* Build a profile-aware system prompt for the mentor on every message. */
        const buildMentorPrompt = (profile, state) => {
          const summary = profileSummary(profile);
          const goal = profile?.goal || 'Building tech skills';
          const tone = LEVELS[profile?.level]?.tone || 'encouraging + direct';
          const currentQuest = state?.roadmap?.find(w => w.status === 'current');
          const currentLine = currentQuest ? `Current quest (week ${currentQuest.week}): "${currentQuest.task}"` : 'No active quest yet.';
          const recentWins = (state?.wins || []).slice(0, 3).map(w => `- ${w.title}`).join('\n') || '- (none yet)';
          const topics = (profile?.chatTopics || []).slice(-6).join(', ') || '(none yet)';
          return `You are Forge AI, a personal career mentor for an ITHS (Information Technology High School, Long Island City, NYC) student.
Tone: ${tone}. Be specific, never generic. 2–4 sentences unless asked for more.

STUDENT PROFILE
Goal: "${goal}"
${summary}
Recent chat topics: ${topics}

CURRENT STATE
${currentLine}
XP: ${state?.xp ?? 0} · Level: ${state?.level ?? 1} · Streak: ${state?.streak ?? 0} days
Recent wins:
${recentWins}

GUIDELINES
- Tailor every answer to this student's track, level, and outcome — never give generic advice.
- Reference their current quest when relevant.
- If the student says they're stuck, bored, want to switch focus, or want a harder/easier challenge, suggest a concrete next step.
- Keep it human. No corporate fluff. No bullet salad unless they ask for a list.`;
        };

        /* Detect when a chat message should trigger an adaptive quest change. */
        const detectQuestSignal = (message) => {
          const m = message.toLowerCase();
          if (/(too hard|too tough|over my head|stuck|lost|confused|don'?t (get|understand)|can'?t do)/.test(m)) return 'easier';
          if (/(too easy|boring|already know|been there|trivial|baby|simple)/.test(m)) return 'harder';
          if (/(switch|change|pivot|different|instead of|focus on|interested in|want to learn|try)/.test(m)) return 'pivot';
          if (/(refine|tweak|adjust|update|customize|tailor|change.*quest|new quest)/.test(m)) return 'refine';
          return null;
        };

        /* Extract topic keywords from a chat message for memory. */
        const extractTopics = (message) => {
          const m = message.toLowerCase();
          const topics = [];
          const dict = {
            'react': 'React', 'javascript': 'JS', 'python': 'Python', 'java': 'Java', 'node': 'Node.js',
            'css': 'CSS', 'html': 'HTML', 'next.js': 'Next.js', 'nextjs': 'Next.js',
            'cyber': 'cybersecurity', 'security': 'security', 'hack': 'hacking', 'ctf': 'CTFs', 'linux': 'Linux',
            'ai': 'AI', 'ml': 'ML', 'machine': 'ML', 'data': 'data',
            'game': 'games', 'unity': 'Unity', 'godot': 'Godot',
            'design': 'design', 'figma': 'Figma', 'ui': 'UI', 'ux': 'UX',
            'college': 'college', 'cornell': 'Cornell', 'nyu': 'NYU', 'stony': 'Stony Brook',
            'internship': 'internships', 'resume': 'resume', 'interview': 'interviews', 'portfolio': 'portfolio',
          };
          for (const k in dict) { if (m.includes(k)) topics.push(dict[k]); }
          return [...new Set(topics)];
        };

        /* Generate a profile-aware 12-week roadmap. */
        const generateAdaptiveRoadmap = async (profile) => {
          const trackLabel = TRACKS[profile.track]?.label || 'Web Development';
          const trackSkills = TRACKS[profile.track]?.skills?.join(', ') || '';
          const levelInfo = LEVELS[profile.level] || LEVELS.beginner;
          const time = (TIME_OPTIONS.find(x => x.key === profile.timeCommitment)?.label) || '~10 hrs / week';
          const outcome = OUTCOMES[profile.outcome]?.label || 'portfolio building';
          const xpStart = levelInfo.xpStart;
          const xpStep = levelInfo.xpStep;

          const prompt = `Generate a 12-week career roadmap for an ITHS (Information Technology High School) student.

PROFILE
Goal: "${profile.goal}"
Track: ${trackLabel} (focus skills: ${trackSkills})
Level: ${levelInfo.label} — ${levelInfo.blurb}
Time available: ${time}
Primary outcome: ${outcome}

Return ONLY a valid JSON array with exactly 12 objects. Each object must have these exact keys:
- "week": number (1-12)
- "title": string (3-5 words, catchy + track-specific)
- "task": string (one specific actionable task tailored to ${trackLabel} for a ${levelInfo.label} student, 15-30 words)
- "xp": number (start near ${xpStart}, increase by ${xpStep}-${xpStep + 12} each week)

Tailoring rules:
- Every task must reference concrete tools/skills from this track (${trackSkills}).
- Beginner = micro-projects + setup. Intermediate = ship + iterate. Advanced = recruiter-grade portfolio + outreach.
- Final weeks should drive toward "${outcome}".

Output ONLY the JSON array. No markdown, no fences, no explanation.`;

          const response = await callAI(prompt, 'You are a JSON API. Output ONLY a valid JSON array. No markdown, no fences, no prose.');
          const parsed = safeParseJSON(response, 'array');
          if (Array.isArray(parsed) && parsed.length >= 8) {
            return parsed.slice(0, 12).map((w, i) => ({
              week: w.week || i + 1,
              title: w.title || `Week ${i + 1}`,
              task: w.task || 'Ship something small.',
              xp: w.xp || (xpStart + i * xpStep),
            }));
          }
          // Fallback: synthesize a track+level roadmap so it's never generic
          return buildFallbackRoadmap(profile);
        };

        const buildFallbackRoadmap = (profile) => {
          const lv = LEVELS[profile.level] || LEVELS.beginner;
          const skills = TRACKS[profile.track]?.skills || ['HTML', 'CSS', 'JS', 'React'];
          const outcome = OUTCOMES[profile.outcome]?.label || 'portfolio';
          const trackTasks = {
            web: [
              'Set up VS Code, Git, and ship a styled landing page to GitHub Pages',
              'Build a responsive multi-section portfolio site with semantic HTML + CSS Grid',
              'Convert your portfolio to React with at least 4 reusable components',
              'Add routing + a blog with MDX or markdown rendering',
              'Wire your site to a public REST API and render dynamic data',
              'Add a contact form with validation + serverless email (Resend / Formspree)',
              'Ship a second project: a CRUD app with localStorage persistence',
              'Deploy to Vercel, set up custom domain, hit 95+ Lighthouse',
              'Open-source contribution: fix one issue on a real OSS repo',
              'Refactor your top project for accessibility (WCAG AA)',
              'Record a 60-sec demo video for each portfolio project',
              'Submit applications + share your portfolio publicly',
            ],
            fullstack: [
              'Set up dev stack: Node, Postgres, Git, ship a hello-world API',
              'Build a REST API with Express + Postgres + 3 endpoints',
              'Create a React frontend that consumes your API with auth header',
              'Add Google OAuth login (Auth0 / NextAuth) end-to-end',
              'Persist user-specific data with proper foreign keys + migrations',
              'Add a real-time feature (WebSocket or Pusher)',
              'Write integration tests for your API (Jest + supertest)',
              'Deploy backend to Render/Railway, frontend to Vercel',
              'Add observability: logging + a basic dashboard (Grafana / Logtail)',
              'Refactor for performance: caching, pagination, indexes',
              'Open-source: ship a small npm package related to your stack',
              `Apply: tailor resume to ${outcome}, send 10 outreach emails`,
            ],
            ai: [
              'Set up Python, Jupyter, and run your first notebook',
              'NumPy + Pandas: load a public dataset, do 5 analyses, post on GitHub',
              'Train a simple classifier (sklearn) and write up the results',
              'Build a small NN with PyTorch on MNIST — commit weights + a notebook',
              'Build an LLM-powered app using the Gemini or OpenAI API',
              'Add RAG: index a doc set with embeddings + retrieve answers',
              'Fine-tune or prompt-engineer a model for a niche task you care about',
              'Ship a Streamlit/Gradio demo of your model with a public link',
              'Write a technical blog post explaining one of your ML projects',
              'Reproduce one paper or replicate a Kaggle notebook from scratch',
              'Open-source: contribute to Hugging Face / a popular ML repo',
              `Apply: tailor your projects to ${outcome}, write your story`,
            ],
            cyber: [
              'Install Kali Linux in a VM and complete TryHackMe "Pre Security"',
              'Master Linux fundamentals: 30 essential commands, write a cheatsheet',
              'Networking deep dive: TCP/IP, ports, build a local network diagram',
              'Solve 5 beginner CTFs on TryHackMe — write up each solution',
              'Learn Burp Suite basics on PortSwigger Web Security Academy',
              'Complete OWASP Top 10 lab walkthroughs — document each',
              'Set up your own home lab: vulnerable VM + monitoring',
              'CompTIA Security+ study sprint — take 3 practice exams',
              'Write a security audit of one open-source project',
              'Pick a specialization: red team, blue team, or appsec — go deep',
              'Solve 10 HackTheBox machines and publish writeups',
              `Apply: target ${outcome} in NYC cybersecurity scene`,
            ],
            game: [
              'Install Unity (or Godot), build "Roll-a-Ball" / first scene',
              'Ship Pong from scratch — physics + scoring + game over',
              'Build a 2D platformer with player movement + 1 enemy + level',
              'Add audio, particles, and game feel polish to your platformer',
              'Build a simple tower-defense or top-down shooter',
              'Learn shader basics — write 2 custom shaders',
              'Ship a small game on itch.io with screenshots + dev log',
              'Multiplayer prototype: local 2-player or simple netcode',
              'Submit one entry to a public game jam (Ludum Dare / GMTK)',

          const goal = profile?.goal || 'your goal';
          const baseXp = upcoming.xp || 200;

          const variants = {
            easier: {
              title: 'Smaller win, same direction',
              task: `Take 25 minutes and ship a tiny version of "${upcoming.title}" using ${skills}. Just the smallest possible piece — clear scope, no perfection.`,
              xp: Math.max(50, Math.round(baseXp * 0.65)),
            },
            harder: {
              title: 'Recruiter-grade stretch',
              task: `Level this up: take "${upcoming.task}" and add a polish layer — tests, deploy, or a write-up — until it'd impress someone hiring for ${goal}.`,
              xp: Math.round(baseXp * 1.35),

NEXT QUEST (currently): "${upcoming.task}" — week ${upcoming.week}, ${upcoming.xp} XP

          useEffect(() => {
            const el = ref.current;
            if (!el) return;
            const observer = new IntersectionObserver(

              { threshold: options.threshold || 0.15, rootMargin: options.rootMargin || '0px 0px -40px 0px' }
            );
            observer.observe(el);
            return () => observer.disconnect();
          }, []);
          return [ref, isVisible];

        const ScrollReveal = ({ children, delay = 0, type = 'up', className = '' }) => {

            if (!canvas) return;

            let W, H;
            const resize = () => {
              W = canvas.offsetWidth * dpr;
              H = canvas.offsetHeight * dpr;
              canvas.width = W;
              canvas.height = H;
            };
            resize();
            window.addEventListener('resize', resize);

            const particles = [];
            const PARTICLE_COUNT = 60;
            const colors = [
              'rgba(255,107,44,0.6)', 'rgba(255,138,61,0.5)', 'rgba(255,184,0,0.4)',
              'rgba(255,209,102,0.35)', 'rgba(129,140,248,0.3)'
            ];

            for (let i = 0; i < PARTICLE_COUNT; i++) {
              particles.push({
                x: Math.random() * W,
                y: H + Math.random() * 200,
                vx: (Math.random() - 0.5) * 0.4 * dpr,
                vy: -(0.3 + Math.random() * 0.8) * dpr,
                size: (1 + Math.random() * 3) * dpr,
                color: colors[Math.floor(Math.random() * colors.length)],
                life: Math.random(),
                decay: 0.001 + Math.random() * 0.003,
                wobbleAmp: 0.5 + Math.random() * 1.5,
                wobbleFreq: 0.01 + Math.random() * 0.02,
                t: Math.random() * 1000,
              });
            }

            let raf;
            const draw = () => {
              ctx.clearRect(0, 0, W, H);
              for (const p of particles) {
                p.t++;
                p.x += p.vx + Math.sin(p.t * p.wobbleFreq) * p.wobbleAmp;
                p.y += p.vy;
                p.life -= p.decay;
                if (p.life <= 0 || p.y < -20) {
                  p.x = Math.random() * W;
                  p.y = H + Math.random() * 100;
                  p.life = 0.7 + Math.random() * 0.3;
                  p.t = Math.random() * 1000;
                }
                ctx.save();
                ctx.globalAlpha = Math.max(0, p.life * 0.8);
                ctx.fillStyle = p.color;
                ctx.shadowColor = p.color;
                ctx.shadowBlur = 8 * dpr;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
              }
              raf = requestAnimationFrame(draw);
            };
            raf = requestAnimationFrame(draw);
            return () => { cancelAnimationFrame(raf); window.removeEventListener('resize', resize); };
          }, []);

          return (
            <canvas
              ref={canvasRef}
              className="absolute inset-0 pointer-events-none z-0"
              style={{ width: '100%', height: '100%', opacity: 0.9 }}

          const [display, setDisplay] = useState('0');
          useEffect(() => {
            if (!isVisible) return;
            const num = parseInt(value);
            if (isNaN(num)) { setDisplay(value); return; }
            const dur = 1800;
            const start = performance.now();
            const tick = (now) => {
              const t = Math.min(1, (now - start) / dur);
              const e = 1 - Math.pow(1 - t, 4); // easeOutQuart
              setDisplay(String(Math.round(num * e)));
              if (t < 1) requestAnimationFrame(tick);
            };
            requestAnimationFrame(tick);
          }, [isVisible, value]);
          return <span ref={ref}>{display}{suffix}</span>;
        };

        const TypewriterText = ({ text, delay = 900, speed = 35 }) => {
          const [displayed, setDisplayed] = useState('');
          const [showCursor, setShowCursor] = useState(true);
          useEffect(() => {
            let i = 0;
            const timeout = setTimeout(() => {
              const interval = setInterval(() => {
                i++;
                setDisplayed(text.slice(0, i));
                if (i >= text.length) {
                  clearInterval(interval);
                  setTimeout(() => setShowCursor(false), 2000);
                }
              }, speed);
              return () => clearInterval(interval);
            }, delay);
            return () => clearTimeout(timeout);
          }, [text, delay, speed]);
          return (
            <span>

            </span>

        };

        /* ── Animated number count-up ───────────────────────────────────────────────── */
        const useCountUp = (target, duration = 900) => {
          const [val, setVal] = useState(target);
          const fromRef = useRef(target);
          const rafRef = useRef();
          useEffect(() => {
            const from = fromRef.current;
            if (from === target) return;
            const start = performance.now();
            const tick = (now) => {
              const t = Math.min(1, (now - start) / duration);
              // easeOutCubic
              const e = 1 - Math.pow(1 - t, 3);
              setVal(Math.round(from + (target - from) * e));
              if (t < 1) rafRef.current = requestAnimationFrame(tick);
              else fromRef.current = target;
            };
            rafRef.current = requestAnimationFrame(tick);
            return () => cancelAnimationFrame(rafRef.current);
          }, [target, duration]);
          return val;

        /* ── Confetti — pure-canvas warm-gradient particle burst ────────────────────── */
        const Confetti = ({ trigger }) => {
          const canvasRef = useRef(null);
          useEffect(() => {
            if (!trigger) return;
            const canvas = canvasRef.current;
            if (!canvas) return;
            const ctx = canvas.getContext("2d");
            const dpr = window.devicePixelRatio || 1;
            const resize = () => {
              canvas.width = canvas.offsetWidth * dpr;
              canvas.height = canvas.offsetHeight * dpr;
            };
            resize();
            window.addEventListener("resize", resize);

            const W = () => canvas.width;
            const H = () => canvas.height;
            const cx = W() / 2;
            const cy = H() * 0.42;

            const colors = ["#FF6B2C", "#FF8A3D", "#FFB800", "#FFD166", "#FFF1B8"];
            const particles = [];
            const count = 140;
            for (let i = 0; i < count; i++) {
              const angle = (Math.PI * 2 * i) / count + Math.random() * 0.4;
              const speed = 4 + Math.random() * 9;
              particles.push({
                x: cx,
                y: cy,
                vx: Math.cos(angle) * speed * dpr,
                vy: Math.sin(angle) * speed * dpr - 4 * dpr,
                size: (3 + Math.random() * 5) * dpr,
                rot: Math.random() * Math.PI,
                vr: (Math.random() - 0.5) * 0.3,
                color: colors[Math.floor(Math.random() * colors.length)],
                life: 1,
                shape: Math.random() > 0.5 ? "rect" : "circ",
              });
            }

            let raf;
            const gravity = 0.18 * dpr;
            const drag = 0.992;
            const draw = () => {
              ctx.clearRect(0, 0, W(), H());
              let alive = 0;
              for (const p of particles) {
                if (p.life <= 0) continue;
                alive++;
                p.vy += gravity;
                p.vx *= drag;
                p.vy *= drag;
                p.x += p.vx;
                p.y += p.vy;
                p.rot += p.vr;
                p.life -= 0.012;

                ctx.save();
                ctx.translate(p.x, p.y);
                ctx.rotate(p.rot);
                ctx.globalAlpha = Math.max(0, p.life);
                ctx.fillStyle = p.color;
                if (p.shape === "rect") {
                  ctx.fillRect(-p.size, -p.size * 0.4, p.size * 2, p.size * 0.8);
                } else {
                  ctx.beginPath();
                  ctx.arc(0, 0, p.size, 0, Math.PI * 2);
                  ctx.fill();
                }
                ctx.restore();
              }
              if (alive > 0) raf = requestAnimationFrame(draw);
            };
            raf = requestAnimationFrame(draw);
            return () => {
              cancelAnimationFrame(raf);
              window.removeEventListener("resize", resize);
              ctx.clearRect(0, 0, W(), H());
            };
          }, [trigger]);

          return (
            <canvas
              ref={canvasRef}
              className="fixed inset-0 pointer-events-none z-50"
              style={{ width: "100vw", height: "100vh" }}
            />
          );
        };

        };

        /* ── Onboarding (multi-step adaptive wizard) ────────────────────────────────── */
        const StepProgress = ({ step, total }) => (
          <div className="flex items-center justify-center gap-2 mb-8">
            {Array.from({ length: total }).map((_, i) => (
              <span
                key={i}
                className="rounded-full transition-all duration-500"
                style={{
                  height: 4,
                  width: i === step ? 32 : i < step ? 18 : 14,
                  background: i <= step
                    ? 'linear-gradient(90deg, var(--primary-from), var(--primary-to))'
                    : 'rgba(255,255,255,0.08)',
                  boxShadow: i === step ? '0 0 12px rgba(255,138,61,0.5)' : 'none',
                }}
              />
            ))}
          </div>
        );

        const ChoiceCard = ({ Icon, label, blurb, selected, onClick }) => (
          <button
            type="button"
            onClick={onClick}
            className="glass top-rule rounded-2xl p-5 text-left flex items-start gap-4 focus-ring transition-all"
            style={{
              borderColor: selected ? 'rgba(255,138,61,0.45)' : undefined,
              background: selected ? 'rgba(255,138,61,0.06)' : undefined,
              transform: selected ? 'translateY(-1px)' : 'none',
              boxShadow: selected ? '0 8px 28px -10px rgba(255,107,44,0.45)' : 'none',
            }}
          >
            {Icon && (
              <div
                className="w-11 h-11 rounded-xl flex items-center justify-center shrink-0"
                style={{
                  background: selected
                    ? 'linear-gradient(135deg, var(--primary-from), var(--primary-to))'
                    : 'rgba(255,255,255,0.04)',
                  border: selected ? 'none' : '1px solid var(--border)',
                }}
              >
                <Icon size={18} style={{ color: selected ? '#1a0c00' : '#FFC169' }} strokeWidth={2.4} />
              </div>
            )}
            <div className="min-w-0 flex-1">
              <div className="font-display text-base font-semibold tracking-tight">{label}</div>
              {blurb && <div className="text-xs mt-0.5" style={{ color: 'var(--text-muted)' }}>{blurb}</div>}
            </div>
            {selected && <Check size={16} style={{ color: '#FFC169' }} className="shrink-0 mt-1" strokeWidth={2.6} />}
          </button>
        );

        const Onboarding = ({ onSubmit }) => {
          const [step, setStep] = useState(0);
          const [profile, setProfile] = useState({
            goal: '',
            track: null,
            level: null,
            timeCommitment: null,
            outcome: null,
          });
          const taRef = useRef(null);

          useEffect(() => { if (step === 0) taRef.current?.focus(); }, [step]);

          const update = (patch) => setProfile(p => ({ ...p, ...patch }));

          const canAdvance = useMemo(() => {
            if (step === 0) return profile.goal.trim().length > 3;
            if (step === 1) return !!profile.track;
            if (step === 2) return !!profile.level;
            if (step === 3) return !!profile.timeCommitment && !!profile.outcome;
            return false;
          }, [step, profile]);

          const next = () => {
            if (!canAdvance) return;
            if (step === 3) onSubmit({ ...profile, goal: profile.goal.trim() });
            else setStep(s => s + 1);
          };
          const back = () => setStep(s => Math.max(0, s - 1));

          const titles = [
            'What are you forging?',
            'Pick your track',
            'How experienced are you?',
            'Time + outcome',
          ];
          const subs = [
            'One goal. Be specific. Forge will turn it into a 90-day system.',
            'We\'ll tailor every quest, link, and mentor reply to this track.',
            'Sets the difficulty and tone of your roadmap and mentor.',
            'Last step — then your AI roadmap forges in real time.',
          ];

          return (
            <div className="min-h-screen flex items-center justify-center px-6 py-20">
              <div className="w-full max-w-2xl animate-fade-up">
                <div className="text-center mb-8">
                  <div className="inline-flex mb-5">
                    <GradientIcon Icon={step === 0 ? Target : step === 1 ? Compass : step === 2 ? Zap : Rocket} size={20} />
                  </div>
                  <StepProgress step={step} total={4} />
                  <h1
                    className="font-display font-semibold tracking-tight mb-3"
                    style={{ fontSize: 'clamp(28px, 4vw, 42px)', lineHeight: 1.05 }}
                  >
                    {titles[step]}
                  </h1>
                  <p style={{ color: 'var(--text-muted)' }} className="text-base max-w-md mx-auto">
                    {subs[step]}
                  </p>
                </div>

                {/* Step 0: goal */}
                {step === 0 && (
                  <>
                    <div className="glass top-rule rounded-3xl p-6 md:p-8 relative">
                      <textarea
                        ref={taRef}
                        value={profile.goal}
                        onChange={(e) => update({ goal: e.target.value })}
                        onKeyDown={(e) => { if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) next(); }}
                        placeholder="e.g. Get into Cornell Tech with a strong CS portfolio by next fall"
                        className="input-minimal w-full resize-none text-lg leading-relaxed focus:outline-none"
                        style={{ minHeight: 110, fontFamily: 'inherit' }}
                        rows={3}
                      />
                    </div>
                    <div className="mt-6">
                      <p className="text-xs uppercase tracking-widest mb-3" style={{ color: 'var(--text-subtle)', letterSpacing: '0.18em' }}>
                        Or start from
                      </p>
                      <div className="flex flex-wrap gap-2.5">
                        {EXAMPLE_GOALS.map((g) => (
                          <button
                            key={g}
                            onClick={() => update({ goal: g })}
                            className="chip rounded-full px-4 py-2 text-sm focus-ring"
                            style={{
                              background: 'rgba(255,255,255,0.02)',
                              border: '1px solid var(--border)',
                              color: 'var(--text-muted)',
                            }}
                          >
                            {g}
                          </button>
                        ))}
                      </div>
                    </div>
                  </>
                )}

                {/* Step 1: track */}
                {step === 1 && (
                  <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                    {Object.values(TRACKS).map(t => (
                      <ChoiceCard
                        key={t.key}
                        Icon={t.Icon}
                        label={t.label}
                        blurb={t.blurb}
                        selected={profile.track === t.key}
                        onClick={() => update({ track: t.key })}
                      />
                    ))}
                  </div>
                )}

                {/* Step 2: level */}
                {step === 2 && (
                  <div className="grid grid-cols-1 gap-3">
                    {Object.values(LEVELS).map(l => (
                      <ChoiceCard
                        key={l.key}
                        Icon={l.key === 'beginner' ? Sparkles : l.key === 'intermediate' ? Hammer : Trophy}
                        label={l.label}
                        blurb={l.blurb}
                        selected={profile.level === l.key}
                        onClick={() => update({ level: l.key })}
                      />
                    ))}
                  </div>
                )}

                {/* Step 3: time + outcome */}
                {step === 3 && (
                  <div className="space-y-6">
                    <div>
                      <div className="text-xs uppercase tracking-widest mb-3" style={{ color: 'var(--text-subtle)', letterSpacing: '0.18em' }}>Time per week</div>
                      <div className="grid grid-cols-1 sm:grid-cols-3 gap-3">
                        {TIME_OPTIONS.map(t => (
                          <ChoiceCard
                            key={t.key}
                            Icon={Clock}
                            label={t.label}
                            blurb={t.blurb}
                            selected={profile.timeCommitment === t.key}
                            onClick={() => update({ timeCommitment: t.key })}
                          />
                        ))}
                      </div>
                    </div>
                    <div>
                      <div className="text-xs uppercase tracking-widest mb-3" style={{ color: 'var(--text-subtle)', letterSpacing: '0.18em' }}>Primary outcome</div>
                      <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                        {Object.values(OUTCOMES).map(o => (
                          <ChoiceCard
                            key={o.key}
                            Icon={o.Icon}
                            label={o.label}
                            blurb={o.blurb}
                            selected={profile.outcome === o.key}
                            onClick={() => update({ outcome: o.key })}
                          />
                        ))}
                      </div>
                    </div>
                  </div>
                )}

                {/* Nav */}
                <div className="mt-8 flex items-center justify-between gap-3">
                  {step > 0 ? (
                    <button
                      onClick={back}
                      className="px-4 py-2.5 rounded-xl text-sm flex items-center gap-2 focus-ring"
                      style={{ background: 'rgba(255,255,255,0.02)', border: '1px solid var(--border)', color: 'var(--text-muted)' }}
                    >
                      <ArrowLeft size={14} /> Back
                    </button>
                  ) : <span className="text-xs" style={{ color: 'var(--text-subtle)' }}>⌘ + Enter to continue</span>}
                  <PrimaryButton onClick={next} disabled={!canAdvance} style={{ opacity: canAdvance ? 1 : 0.45 }}>
                    {step < 3 ? 'Continue' : 'Forge my roadmap'} <ArrowRight size={15} strokeWidth={2.5} />
                  </PrimaryButton>
                </div>
              </div>
            </div>
          );
        };

        /* ── Forging loader ─────────────────────────────────────────────────────────── */
        const ForgingLoader = ({ profile, onDone }) => {
          const trackLabel = TRACKS[profile?.track]?.label || 'your track';
          const levelLabel = LEVELS[profile?.level]?.label || 'your level';
          const phases = [
            'Analyzing your goal',
            `Mapping ${trackLabel} skills`,
            `Calibrating for ${levelLabel}`,
            'Forging your 12-week plan',
          ];
          const [phase, setPhase] = useState(0);

          useEffect(() => {
            let cancelled = false;
            const run = async () => {
              setTimeout(() => !cancelled && setPhase(1), 700);
              setTimeout(() => !cancelled && setPhase(2), 1500);
              setTimeout(() => !cancelled && setPhase(3), 2300);
              const roadmap = await generateAdaptiveRoadmap(profile);
              const formatted = roadmap.map((w, i) => ({
                ...w,
                week: w.week || i + 1,
                status: i === 0 ? 'current' : 'future',
              }));
              setTimeout(() => { if (!cancelled) onDone(formatted); }, 3300);
            };
            run();
            return () => { cancelled = true; };
          }, [profile]);

          return (
            <div className="min-h-screen flex items-center justify-center px-6">
              <div className="text-center max-w-xl">
                {/* Pulsing forge icon */}
                <div className="relative inline-flex items-center justify-center mb-10">
                  <div
                    className="absolute inset-0 rounded-full"
                    style={{
                      background: "radial-gradient(circle, rgba(255,107,44,0.5) 0%, transparent 65%)",
                      filter: "blur(20px)",
                      animation: "glowPulse 2s ease-in-out infinite",
                    }}
                  />
                  <div
                    className="relative w-20 h-20 rounded-2xl flex items-center justify-center"
                    style={{
                      background: "linear-gradient(135deg, var(--primary-from), var(--primary-to))",
                      boxShadow: "inset 0 1px 0 rgba(255,255,255,0.4), 0 18px 50px -10px rgba(255,107,44,0.6)",
                    }}
                  >
                    <Hammer size={36} style={{ color: "#1a0c00" }} strokeWidth={2.4} />
                  </div>
                </div>

                <h2
                  className="font-display font-semibold tracking-tight mb-3"
                  style={{ fontSize: "clamp(28px, 4vw, 40px)" }}
                >
                  <span className="grad-text-shimmer">Forging your roadmap…</span>
                </h2>
                <p style={{ color: "var(--text-muted)" }} className="text-base mb-2 italic">
                  "{profile?.goal}"
                </p>
                <p style={{ color: "var(--text-subtle)" }} className="text-xs mb-10 uppercase tracking-widest">
                  {profileSummary(profile)}
                </p>

                <div className="space-y-2.5 max-w-sm mx-auto">
                  {phases.map((p, i) => (
                    <div
                      key={p}
                      className="flex items-center gap-3 text-sm transition-all duration-500"
                      style={{ opacity: i <= phase ? 1 : 0.3 }}
                    >
                      <span className="flex items-center justify-center w-5 h-5">
                        {i < phase ? (
                          <Check size={14} style={{ color: "#FFC169" }} strokeWidth={3} />
                        ) : i === phase ? (
                          <span
                            className="w-2 h-2 rounded-full"
                            style={{
                              background: "var(--primary-mid)",
                              boxShadow: "0 0 10px rgba(255,138,61,0.8)",
                              animation: "glowPulse 1.5s ease-in-out infinite",
                            }}
                          />
                        ) : (
                          <CircleDot size={12} style={{ color: "var(--text-subtle)" }} />
                        )}
                      </span>
                      <span style={{ color: i <= phase ? "var(--text)" : "var(--text-subtle)" }}>{p}</span>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          );
        };

        /* ── Dashboard top bar ──────────────────────────────────────────────────────── */
        /* AI status pill — subscribes to AI_STATUS, opens the Connect AI panel on click. */
        const AIStatusPill = ({ onOpenConnect }) => {
          const [status, setStatus] = useState({
            provider: AI_STATUS.provider,
            lastError: AI_STATUS.lastError,
            lastSuccessAt: AI_STATUS.lastSuccessAt,
          });
          useEffect(() => AI_STATUS.subscribe(setStatus), []);

          const live = status.provider && status.provider !== 'fallback';
          const dotColor = live ? '#34D399' : '#F59E0B';
          const text = live
            ? (status.provider === 'gemini' ? 'Gemini live' : 'OpenAI live')
            : (AI_KEYS.gemini || AI_KEYS.openai ? 'AI offline · using fallback' : 'Connect AI');
          const title = status.lastError ? `Last error: ${status.lastError}` : (live ? 'Real AI is driving the UI' : 'Click to add an API key');

          return (
            <button
              onClick={onOpenConnect}
              title={title}
              className="hidden sm:flex items-center gap-2 px-3 py-1.5 rounded-full text-xs focus-ring transition-colors"
              style={{
                background: live ? 'rgba(52,211,153,0.08)' : 'rgba(245,158,11,0.08)',
                border: `1px solid ${live ? 'rgba(52,211,153,0.25)' : 'rgba(245,158,11,0.25)'}`,
                color: live ? '#86EFAC' : '#FCD34D',
              }}
            >
              <span
                className="w-1.5 h-1.5 rounded-full"
                style={{ background: dotColor, boxShadow: `0 0 6px ${dotColor}` }}
              />
              {text}
            </button>
          );
        };

        /* Connect AI modal — paste a Gemini or OpenAI key, stored in localStorage. */
        const ConnectAIModal = ({ open, onClose }) => {
          const [gemini, setGemini] = useState(AI_KEYS.gemini);
          const [openai, setOpenai] = useState(AI_KEYS.openai);
          const [testing, setTesting] = useState(false);
          const [testResult, setTestResult] = useState(null);

          useEffect(() => {
            if (open) {
              setGemini(AI_KEYS.gemini);
              setOpenai(AI_KEYS.openai);
              setTestResult(null);
            }
          }, [open]);

          const save = () => {
            AI_KEYS.gemini = gemini.trim();
            AI_KEYS.openai = openai.trim();
            setTestResult(null);
            // Reset status so the next call updates the pill
            AI_STATUS.set(null);
          };

          const test = async () => {
            save();
            setTesting(true);
            setTestResult(null);
            try {
              const out = await callAI('Reply with the single word: OK', 'You are a test endpoint. Reply with exactly: OK');
              const ok = AI_STATUS.provider && AI_STATUS.provider !== 'fallback';
              setTestResult({ ok, msg: ok ? `${AI_STATUS.provider} responded ✓` : (AI_STATUS.lastError || 'Request fell back to mock') });
            } catch (e) {
              setTestResult({ ok: false, msg: String(e.message || e) });
            }
            setTesting(false);
          };
