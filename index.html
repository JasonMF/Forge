        const trackQuickLink = (track, onNav) => {
          const map = {
            web:       { label: 'Portfolio generator',  blurb: 'Turn a GitHub repo into a bullet',     Icon: Github,    target: 'portfolio' },
            fullstack: { label: 'Portfolio generator',  blurb: 'Turn a GitHub repo into a bullet',     Icon: Github,    target: 'portfolio' },
            ai:        { label: 'Model playground',     blurb: 'Test prompts, log experiments',        Icon: Brain,     target: 'portfolio' },
            cyber:     { label: 'CTF lab notebook',     blurb: 'Log writeups + Security+ progress',    Icon: Shield,    target: 'portfolio' },
            game:      { label: 'Game dev log',         blurb: 'Track builds, jams, and itch releases', Icon: Gamepad2,  target: 'portfolio' },
            design:    { label: 'Case-study builder',   blurb: 'Turn projects into design case studies', Icon: PenTool,  target: 'portfolio' },
          };
          return map[track] || map.web;
        };

        /* AI Pulse — a panel that summarizes how the AI is reading your progress. */
        const AIPulse = ({ profile, state }) => {
          const t = TRACKS[profile?.track]?.label || 'Tech';
          const lv = LEVELS[profile?.level]?.label || 'Beginner';
          const recentTopics = (profile?.chatTopics || []).slice(-4);
          const completed = state.roadmap.filter(w => w.status === 'done').length;
          const pct = Math.round((completed / state.roadmap.length) * 100);
          const adapted = state.roadmap.filter(w => w.adapted).length;

          return (
            <div className="glass top-rule rounded-3xl p-6 h-full flex flex-col">
              <div className="flex items-center justify-between mb-4">
                <div className="flex items-center gap-2">
                  <Activity size={15} style={{ color: '#FFC169' }} />
                  <h3 className="font-display text-base font-semibold tracking-tight">AI Pulse</h3>
                </div>
                <span
                  className="text-[10px] px-2 py-0.5 rounded-full uppercase tracking-widest"
                  style={{ background: 'rgba(255,138,61,0.1)', color: '#FFC169', letterSpacing: '0.18em' }}
                >
                  Live
                </span>
              </div>
              <p className="text-sm leading-relaxed mb-4" style={{ color: 'var(--text-muted)' }}>
                Tuning your roadmap for a <span style={{ color: '#FFC169' }}>{lv.toLowerCase()}</span> learner on the <span style={{ color: '#FFC169' }}>{t}</span> track.
                {adapted > 0 && <> AI has rewritten <span style={{ color: '#FFC169' }}>{adapted}</span> quest{adapted === 1 ? '' : 's'} based on your chats.</>}
              </p>
              <div className="space-y-3 mt-auto">
                <div>
                  <div className="flex items-center justify-between text-xs mb-1.5">
                    <span style={{ color: 'var(--text-subtle)' }}>Roadmap progress</span>
                    <span className="tabular" style={{ color: 'var(--text-muted)' }}>{completed} / {state.roadmap.length} · {pct}%</span>
                  </div>
                  <div className="relative h-1.5 rounded-full overflow-hidden" style={{ background: 'rgba(255,255,255,0.05)' }}>
                    <div
                      className="absolute inset-y-0 left-0 rounded-full transition-all duration-700"
                      style={{
                        width: `${pct}%`,
                        background: 'linear-gradient(90deg, var(--primary-from), var(--primary-to))',
                      }}
                    />
                  </div>
                </div>
                {recentTopics.length > 0 && (
                  <div>
                    <div className="text-xs mb-1.5" style={{ color: 'var(--text-subtle)' }}>Recent chat topics</div>
                    <div className="flex flex-wrap gap-1.5">
                      {recentTopics.map((tp, i) => (
                        <span
                          key={i}
                          className="text-[11px] px-2 py-0.5 rounded-full"
                          style={{ background: 'rgba(255,255,255,0.03)', border: '1px solid var(--border)', color: 'var(--text-muted)' }}
                        >
                          {tp}
                        </span>
                      ))}
                    </div>
                  </div>
                )}
              </div>
            </div>
          );
        };

        /* ── Dashboard ──────────────────────────────────────────────────────────────── */
        const Dashboard = ({ state, dispatch, onNav, profile, user, signOut }) => {
          const [exiting, setExiting] = useState(false);
          const [entering, setEntering] = useState(false);
          const [sweep, setSweep] = useState(false);
          const [confetti, setConfetti] = useState(0);
          const [adapting, setAdapting] = useState(false);
          const [adaptToast, setAdaptToast] = useState(null);

          const currentTask = useMemo(
            () => state.roadmap.find((w) => w.status === "current"),
            [state.roadmap]
          );

          const completeQuest = () => {
            if (!currentTask) return;
            setSweep(true);
            setConfetti((n) => n + 1);
            setTimeout(() => setExiting(true), 450);
            setTimeout(() => {
              dispatch({ type: 'complete', xp: currentTask.xp, week: currentTask.week });
              setExiting(false);
              setSweep(false);
              setEntering(true);
            }, 1000);
            setTimeout(() => setEntering(false), 1700);

            // After a short delay, ask the AI to adapt the upcoming quest based on completion + profile.
            setTimeout(async () => {
              setAdapting(true);
              const next = await adaptNextQuest({
                profile,
                state,
                completedTask: currentTask,
                signal: 'advance',
              });
              setAdapting(false);
              if (next) {
                dispatch({ type: 'adapt_current_quest', quest: next, reason: 'tuned after completion' });
                setAdaptToast('AI tuned your next quest');
                setTimeout(() => setAdaptToast(null), 3500);
              }
            }, 1900);
          };

          const refineCurrentQuest = async () => {
            if (!currentTask || adapting) return;
            setAdapting(true);
            const next = await adaptNextQuest({
              profile,
              state,
              completedTask: null,
              signal: 'refine',
            });
            setAdapting(false);
            if (next) {
              dispatch({ type: 'adapt_current_quest', quest: next, reason: 'manual refine' });
              setAdaptToast('Quest refined to match your profile');
              setTimeout(() => setAdaptToast(null), 3500);
            }
          };

          const trackLink = trackQuickLink(profile?.track, onNav);
          const TrackBadgeIcon = TRACKS[profile?.track]?.Icon || Compass;

          return (
            <div>
              <Confetti trigger={confetti} />
              <TopBar
                xp={state.xp}
                level={state.level}
                streak={state.streak}
                onNav={onNav}
                onProfile={() => {}}
                user={user}
                signOut={signOut}
              />

              {/* Adaptive toast */}
              {adaptToast && (
                <div
                  className="fixed top-20 left-1/2 z-40 px-4 py-2.5 rounded-full text-sm flex items-center gap-2"
                  style={{
                    transform: 'translateX(-50%)',
                    background: 'linear-gradient(135deg, rgba(255,107,44,0.95), rgba(255,184,0,0.9))',
                    color: '#1a0c00',
                    boxShadow: '0 12px 32px -8px rgba(255,107,44,0.6)',
                    animation: 'fadeUp 0.4s cubic-bezier(.2,.8,.2,1)',
                  }}
                >
                  <Wand2 size={14} strokeWidth={2.6} />
                  <span className="font-medium">{adaptToast}</span>
                </div>
              )}

              <main className="max-w-7xl mx-auto px-6 py-8">
                {/* Personalized Greeting */}
                <div
                  className="mb-8 animate-fade-up"
                  style={{ animationDelay: "0.05s", animationFillMode: "both" }}
                >
                  <h1 className="font-display font-semibold tracking-tight" style={{ fontSize: "clamp(24px, 3vw, 34px)", lineHeight: 1.1 }}>
                    Welcome back, <span className="grad-text">{user?.name?.split(' ')[0] || 'Builder'}</span>.
                  </h1>
                  {profile?.goal && (
                    <div className="mt-3 flex flex-wrap items-center gap-2">
                      <div className="inline-flex items-center gap-2.5 px-4 py-2 rounded-xl" style={{ background: 'rgba(255,138,61,0.06)', border: '1px solid rgba(255,138,61,0.15)' }}>
                        <Target size={14} style={{ color: '#FFC169' }} />
                        <span className="text-sm" style={{ color: 'var(--text-muted)' }}>Goal: </span>
                        <span className="text-sm font-medium" style={{ color: '#FFC169' }}>{profile.goal}</span>
                      </div>
                      <div className="inline-flex items-center gap-2 px-3 py-2 rounded-xl" style={{ background: 'rgba(255,255,255,0.025)', border: '1px solid var(--border)' }}>
                        <TrackBadgeIcon size={13} style={{ color: '#FFC169' }} />
                        <span className="text-xs" style={{ color: 'var(--text-muted)' }}>{TRACKS[profile.track]?.label}</span>
                      </div>
                      <div className="inline-flex items-center gap-2 px-3 py-2 rounded-xl" style={{ background: 'rgba(255,255,255,0.025)', border: '1px solid var(--border)' }}>
                        <Zap size={13} style={{ color: '#FFC169' }} />
                        <span className="text-xs" style={{ color: 'var(--text-muted)' }}>{LEVELS[profile.level]?.label}</span>
                      </div>
                    </div>
                  )}
                  <p className="text-sm mt-3" style={{ color: "var(--text-muted)" }}>
                    {greetingFor(profile?.level)} You're on a {state.streak}-day streak.
                  </p>
                </div>

                {/* Bento grid: 12 cols */}
                <div
                  className="grid grid-cols-1 lg:grid-cols-12 gap-4"
                  style={{ gridAutoRows: "minmax(0, auto)" }}
                >
                  {/* Hero quest — col-span-8, row-span-2 */}
                  <div
                    className="lg:col-span-8 lg:row-span-2"
                    style={{ animation: "fadeUp 0.7s cubic-bezier(.2,.8,.2,1) 0.12s both" }}
                  >
                    <TodaysQuest
                      task={currentTask}
                      onComplete={completeQuest}
                      onRefine={refineCurrentQuest}
                      sweep={sweep}
                      exiting={exiting}
                      entering={entering}
                      adapting={adapting}
                    />
                  </div>

                  {/* Stats */}
                  <div
                    className="lg:col-span-4"
                    style={{ animation: "fadeUp 0.7s cubic-bezier(.2,.8,.2,1) 0.20s both" }}
                  >
                    <StatsCard
                      xp={state.xp}
                      xpToNext={state.xpToNext}
                      level={state.level}
                      streak={state.streak}
                    />
                  </div>

                  {/* Skill tree */}
                  <div
                    className="lg:col-span-4 lg:row-span-2"
                    style={{ animation: "fadeUp 0.7s cubic-bezier(.2,.8,.2,1) 0.28s both" }}
                  >
                    <SkillTree weeks={state.roadmap} currentWeek={state.currentWeek} />
                  </div>

                  {/* AI Pulse — adaptive panel */}
                  <div
                    className="lg:col-span-4"
                    style={{ animation: "fadeUp 0.7s cubic-bezier(.2,.8,.2,1) 0.34s both" }}
                  >
                    <AIPulse profile={profile} state={state} />
                  </div>

                  {/* Recent wins */}
                  <div
                    className="lg:col-span-4"
                    style={{ animation: "fadeUp 0.7s cubic-bezier(.2,.8,.2,1) 0.42s both" }}
                  >
                    <RecentWins wins={state.wins} />
                  </div>
                </div>

                {/* Adaptive quick links */}
                <div
                  className="mt-6 grid grid-cols-1 sm:grid-cols-3 gap-4"
                  style={{ animation: "fadeUp 0.7s cubic-bezier(.2,.8,.2,1) 0.5s both" }}
                >
                  <button
                    onClick={() => onNav(trackLink.target)}
                    className="glass glass-hover top-rule rounded-3xl p-6 text-left flex items-center gap-4 focus-ring"
                  >
                    <GradientIcon Icon={trackLink.Icon} size={20} />
                    <div className="flex-1 min-w-0">
                      <div className="font-display text-base font-semibold tracking-tight">{trackLink.label}</div>
                      <div className="text-sm" style={{ color: "var(--text-muted)" }}>{trackLink.blurb}</div>
                    </div>
                    <ChevronRight size={16} style={{ color: "var(--text-subtle)" }} />
                  </button>
                  <button
                    onClick={() => onNav("roadmap")}
                    className="glass glass-hover top-rule rounded-3xl p-6 text-left flex items-center gap-4 focus-ring"
                  >
                    <GradientIcon Icon={Compass} size={20} />
                    <div className="flex-1 min-w-0">
                      <div className="font-display text-base font-semibold tracking-tight">Full roadmap</div>
                      <div className="text-sm" style={{ color: "var(--text-muted)" }}>All 12 weeks of {TRACKS[profile?.track]?.label || 'your plan'}</div>
                    </div>
                    <ChevronRight size={16} style={{ color: "var(--text-subtle)" }} />
                  </button>
                  <button
                    onClick={() => onNav("leaderboard")}
                    className="glass glass-hover top-rule rounded-3xl p-6 text-left flex items-center gap-4 focus-ring"
                  >
                    <GradientIcon Icon={Trophy} size={20} />
                    <div className="flex-1 min-w-0">
                      <div className="font-display text-base font-semibold tracking-tight">ITHS Leaderboard</div>
                      <div className="text-sm" style={{ color: "var(--text-muted)" }}>See who's forging the hardest</div>
                    </div>
                    <ChevronRight size={16} style={{ color: "var(--text-subtle)" }} />
                  </button>
                </div>
              </main>
            </div>
          );
        };

        /* ── Portfolio generator ───────────────────────────────────────────────────── */
        const Portfolio = ({ onNav, state, user, signOut }) => {
          const [url, setUrl] = useState("");
          const [loading, setLoading] = useState(false);
          const [bullet, setBullet] = useState("");
          const [copied, setCopied] = useState(false);
          const [savedBullets, setSavedBullets] = useState([]);
          const [editIdx, setEditIdx] = useState(null);
          const [editText, setEditText] = useState("");

          // Load saved portfolio from localStorage
          useEffect(() => {
            if (user?.email) {
              const saved = JSON.parse(localStorage.getItem('forge_portfolio_' + user.email) || '[]');
              setSavedBullets(saved);
            }
          }, [user]);

          // Persist whenever savedBullets changes
          useEffect(() => {
            if (user?.email && savedBullets.length >= 0) {
              localStorage.setItem('forge_portfolio_' + user.email, JSON.stringify(savedBullets));
            }
          }, [savedBullets, user]);

          const generate = async () => {
            if (!url.trim()) return;
            setLoading(true);
            setBullet("");
            try {
              const result = await generateBullet(url.trim());
              setBullet(result);
            } catch (e) {
              setBullet('Unable to generate bullet. Please try again.');
            }
            setLoading(false);
          };

          const copy = (text) => {
            navigator.clipboard?.writeText(text || bullet);
            setCopied(true);
            setTimeout(() => setCopied(false), 1800);
          };

          const saveBullet = () => {
            if (!bullet) return;
            setSavedBullets(prev => [{ url: url.trim(), bullet, savedAt: Date.now() }, ...prev]);
            setBullet("");
            setUrl("");
          };

          const deleteBullet = (idx) => {
            setSavedBullets(prev => prev.filter((_, i) => i !== idx));
          };

          const startEdit = (idx) => {
            setEditIdx(idx);
            setEditText(savedBullets[idx].bullet);
          };

          const saveEdit = () => {
            setSavedBullets(prev => prev.map((b, i) => i === editIdx ? { ...b, bullet: editText } : b));
            setEditIdx(null);
            setEditText("");
          };

          const copyAll = () => {
            const all = savedBullets.map(b => '• ' + b.bullet).join('\n');
            navigator.clipboard?.writeText(all);
            setCopied(true);
            setTimeout(() => setCopied(false), 1800);
          };

          return (
            <div>
              <TopBar xp={state.xp} level={state.level} streak={state.streak} onNav={onNav} onProfile={() => {}} user={user} signOut={signOut} />
              <main className="max-w-4xl mx-auto px-6 py-12">
                <div className="mb-10 animate-fade-up">
                  <div className="inline-flex mb-4">
                    <GradientIcon Icon={Github} size={20} />
                  </div>
                  <h1 className="font-display font-semibold tracking-tight mb-2" style={{ fontSize: "clamp(32px, 4vw, 44px)", lineHeight: 1.05 }}>
                    Portfolio builder
                  </h1>
                  <p style={{ color: "var(--text-muted)" }} className="max-w-xl">
                    Paste a GitHub repo URL. Forge uses AI to read your README and generate a sharp,
                    recruiter-ready resume bullet. Save, edit, and build your portfolio.
                  </p>
                </div>

                {/* Generator */}
                <div className="glass top-rule rounded-3xl p-6 md:p-7 animate-fade-up" style={{ animationDelay: "0.1s", animationFillMode: "both" }}>
                  <label className="text-xs uppercase tracking-widest block mb-3" style={{ color: "var(--text-subtle)", letterSpacing: "0.2em" }}>
                    GitHub URL
                  </label>
                  <div className="flex flex-col sm:flex-row items-stretch gap-3 p-2 rounded-2xl" style={{ background: "rgba(255,255,255,0.025)", border: "1px solid var(--border)" }}>
                    <div className="flex items-center gap-3 flex-1 px-3">
                      <Github size={16} style={{ color: "var(--text-subtle)" }} />
                      <input value={url} onChange={(e) => setUrl(e.target.value)} onKeyDown={(e) => e.key === "Enter" && generate()}
                        placeholder="https://github.com/yourname/your-project" className="input-minimal flex-1 py-3 text-base focus:outline-none" />
                    </div>
                    <PrimaryButton onClick={generate}>
                      {loading ? "Generating…" : "Generate bullet"}
                      {!loading && <ArrowRight size={15} strokeWidth={2.5} />}
                    </PrimaryButton>
                  </div>
                </div>

                {/* Result */}
                <div className="mt-6">
                  {loading && (
                    <div className="glass top-rule rounded-3xl p-7 animate-fade-up">
                      <div className="flex items-center gap-3 mb-4">
                        <Sparkles size={15} style={{ color: "#FFC169" }} />
                        <span className="text-sm grad-text-shimmer font-medium">Reading your README…</span>
                      </div>
                      <div className="space-y-3">
                        <div className="h-3 rounded-full w-11/12" style={{ background: "rgba(255,255,255,0.04)" }} />
                        <div className="h-3 rounded-full w-10/12" style={{ background: "rgba(255,255,255,0.04)" }} />
                        <div className="h-3 rounded-full w-8/12" style={{ background: "rgba(255,255,255,0.04)" }} />
                      </div>
                    </div>
                  )}

                  {bullet && !loading && (
                    <div className="relative glass top-rule rounded-3xl p-7 animate-fade-up" style={{ animationDuration: "0.6s" }}>
                      <div className="absolute inset-0 rounded-3xl pointer-events-none" style={{
                        padding: 1, background: "linear-gradient(135deg, rgba(255,107,44,0.5), rgba(255,184,0,0.3), rgba(129,140,248,0.3))",
                        WebkitMask: "linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0)", WebkitMaskComposite: "xor", maskComposite: "exclude",
                      }} />
                      <div className="flex items-center justify-between mb-5">
                        <div className="flex items-center gap-2">
                          <Sparkles size={15} style={{ color: "#FFC169" }} />
                          <span className="text-xs uppercase tracking-widest" style={{ color: "#FFC169", letterSpacing: "0.18em" }}>Generated bullet</span>
                        </div>
                        <div className="flex items-center gap-2">
                          <button onClick={() => copy()} className="flex items-center gap-1.5 px-3 py-1.5 rounded-full text-xs focus-ring transition-colors"
                            style={{ background: "rgba(255,255,255,0.03)", border: "1px solid var(--border)", color: copied ? "#34D399" : "var(--text-muted)" }}>
                            {copied ? <Check size={13} strokeWidth={2.6} /> : <Copy size={13} />} {copied ? "Copied" : "Copy"}
                          </button>
                          <button onClick={saveBullet} className="flex items-center gap-1.5 px-3 py-1.5 rounded-full text-xs focus-ring transition-colors"
                            style={{ background: "rgba(255,138,61,0.1)", border: "1px solid rgba(255,138,61,0.25)", color: "#FFC169" }}>
                            <Check size={13} strokeWidth={2.6} /> Save to portfolio
                          </button>
                        </div>
                      </div>
                      <p className="text-lg leading-relaxed" style={{ letterSpacing: "-0.01em" }}>{bullet}</p>
                    </div>
                  )}

                  {!loading && !bullet && savedBullets.length === 0 && (
                    <div className="mt-8">
                      {/* Demo Section */}
                      <div className="mb-6 flex items-center gap-3">
                        <h3 className="font-display font-semibold text-lg tracking-tight">See it in action</h3>
                        <span className="text-[10px] uppercase tracking-widest px-2.5 py-1 rounded-full font-semibold" style={{
                          background: 'rgba(129,140,248,0.1)', border: '1px solid rgba(129,140,248,0.25)', color: '#818CF8', letterSpacing: '0.15em'
                        }}>Demo</span>
                      </div>
                      <div className="space-y-3">
                        {[
                          {
                            repo: 'github.com/student/weather-dashboard',
                            bullet: 'Built a real-time weather dashboard using React and the OpenWeatherMap API, featuring 5-day forecasts, geolocation-based defaults, and dynamic SVG weather animations. Deployed on Vercel with 98/100 Lighthouse performance score.',
                            tech: 'React · API · Vercel'
                          },
                          {
                            repo: 'github.com/student/task-flow-app',
                            bullet: 'Developed a collaborative project management tool with drag-and-drop Kanban boards, real-time WebSocket sync, and JWT authentication. Implemented CI/CD pipeline via GitHub Actions with automated testing achieving 89% code coverage.',
                            tech: 'Node.js · WebSocket · PostgreSQL'
                          },
                          {
                            repo: 'github.com/student/ai-study-buddy',
                            bullet: 'Architected an AI-powered study companion that generates personalized flashcards and quiz questions from uploaded notes using the Gemini API. Features spaced repetition algorithms and progress analytics. 150+ active student users.',
                            tech: 'Python · Gemini API · Firebase'
                          },
                        ].map((demo, i) => (
                          <div key={i} className="glass top-rule rounded-2xl p-5 opacity-80" style={{ animation: `fadeUp 0.5s cubic-bezier(.2,.8,.2,1) ${0.08 * i + 0.1}s both` }}>
                            <div className="flex items-center gap-2 mb-3">
                              <Sparkles size={13} style={{ color: '#818CF8' }} />
                              <span className="text-xs uppercase tracking-widest" style={{ color: '#818CF8', letterSpacing: '0.15em' }}>Example output</span>
                            </div>
                            <p className="text-sm leading-relaxed mb-3">{demo.bullet}</p>
                            <div className="flex items-center justify-between">
                              <div className="flex items-center gap-2 text-xs" style={{ color: 'var(--text-subtle)' }}>
                                <Github size={11} />
                                <span>{demo.repo}</span>
                              </div>
                              <span className="text-[10px] px-2 py-0.5 rounded-full" style={{ background: 'rgba(255,255,255,0.04)', border: '1px solid var(--border)', color: 'var(--text-subtle)' }}>{demo.tech}</span>
                            </div>
                          </div>
                        ))}
                      </div>
                      <div className="mt-6 text-center">
                        <p className="text-sm" style={{ color: "var(--text-muted)" }}>
                          <span className="grad-text font-medium">Try it yourself</span> — paste any GitHub URL above to generate your first bullet.
                        </p>
                      </div>
                    </div>
                  )}
                </div>

                {/* Saved Portfolio */}
                {savedBullets.length > 0 && (
                  <div className="mt-12 animate-fade-up" style={{ animationDelay: "0.15s", animationFillMode: "both" }}>
                    <div className="flex items-center justify-between mb-6">
                      <div>
                        <h2 className="font-display font-semibold text-xl tracking-tight">Your portfolio</h2>
                        <p className="text-sm mt-1" style={{ color: "var(--text-muted)" }}>{savedBullets.length} project{savedBullets.length !== 1 ? 's' : ''} saved</p>
                      </div>
                      <button onClick={copyAll} className="flex items-center gap-1.5 px-4 py-2 rounded-full text-sm focus-ring transition-colors"
                        style={{ background: "rgba(255,255,255,0.03)", border: "1px solid var(--border)", color: "var(--text-muted)" }}>
                        <Copy size={14} /> Copy all
                      </button>
                    </div>

                    <div className="space-y-3">
                      {savedBullets.map((item, i) => (
                        <div key={item.savedAt + i} className="glass top-rule rounded-2xl p-5 group" style={{ animation: `fadeUp 0.4s cubic-bezier(.2,.8,.2,1) ${0.04 * i}s both` }}>
                          {editIdx === i ? (
                            <div>

        /* ── AI Chat Panel (adaptive, contextual mentor) ────────────────────────── */
        const SUGGESTED_BY_TRACK = {
          web:       ['What should I build this week?', 'Review my landing page idea', 'Make this quest harder'],
          fullstack: ['Suggest an API project', 'How do I structure auth?', 'Make this quest harder'],
          ai:        ['Beginner-friendly ML project?', 'Explain RAG simply', 'Make this quest harder'],
          cyber:     ['Best CTF for my level?', 'Linux commands to drill', 'Make this quest harder'],
          game:      ['Unity vs Godot for me?', 'First playable in a weekend?', 'Make this quest harder'],
          design:    ['Critique my Figma file', 'Best system to study?', 'Make this quest harder'],
        };

        const ChatPanel = ({ profile, state, dispatch, updateProfile }) => {
          const [open, setOpen] = useState(false);
          const [messages, setMessages] = useState([
            { role: 'assistant', content: profile?.goal
                ? `Hey ${profile?.goal ? '' : ''}— I see you're aiming for "${profile.goal}". I'll tailor every reply to your ${TRACKS[profile.track]?.label || 'track'} + ${LEVELS[profile.level]?.label?.toLowerCase() || ''} setup. What do you want to dig into?`
                : 'Hey! I\'m your Forge AI mentor. Ask me anything about tech careers, college prep, coding skills, or portfolio building.'
            }
          ]);
          const [input, setInput] = useState('');
          const [loading, setLoading] = useState(false);
          const [adaptingFromChat, setAdaptingFromChat] = useState(false);
          const endRef = useRef(null);
          const inputRef = useRef(null);

          useEffect(() => { endRef.current?.scrollIntoView({ behavior: 'smooth' }); }, [messages]);
          useEffect(() => { if (open) inputRef.current?.focus(); }, [open]);

          const suggestions = SUGGESTED_BY_TRACK[profile?.track] || SUGGESTED_BY_TRACK.web;

          const callMentor = async (msg, history) => {
            const sys = buildMentorPrompt(profile, state);
            if (AI_KEYS.gemini) {
              try {
                const chatHistory = history.slice(-6).map(m => ({
                  role: m.role === 'assistant' ? 'model' : 'user',
                  parts: [{ text: m.content }],
                }));
                const res = await fetch(`${geminiUrl()}?key=${AI_KEYS.gemini}`, {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({
                    system_instruction: { parts: [{ text: sys }] },
                    contents: [...chatHistory, { role: 'user', parts: [{ text: msg }] }],
                    generationConfig: { temperature: 0.8, maxOutputTokens: 600 },
                  }),
                });
                if (res.ok) {
                  const data = await res.json();
                  const text = data.candidates?.[0]?.content?.parts?.[0]?.text;
                  if (text) { AI_STATUS.set('gemini'); return text; }
                }
                throw new Error('Gemini chat returned ' + res.status);
              } catch (e) { console.warn('Mentor chat (Gemini) error:', e); AI_STATUS.set('fallback', String(e.message || e)); }
            }
            if (AI_KEYS.openai) {
              try {
                const chatHistory = history.slice(-6).map(m => ({ role: m.role === 'assistant' ? 'assistant' : 'user', content: m.content }));
                const res = await fetch(AI_CONFIG.openaiUrl, {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${AI_KEYS.openai}` },
                  body: JSON.stringify({
                    model: AI_CONFIG.openaiModel,
                    messages: [{ role: 'system', content: sys }, ...chatHistory, { role: 'user', content: msg }],
                    max_tokens: 600, temperature: 0.8,
                  }),
                });
                if (res.ok) {
                  const data = await res.json();
                  const text = data.choices?.[0]?.message?.content;
                  if (text) { AI_STATUS.set('openai'); return text; }
                }
                throw new Error('OpenAI chat returned ' + res.status);
              } catch (e) { console.warn('Mentor chat (OpenAI) error:', e); AI_STATUS.set('fallback', String(e.message || e)); }
            }
            AI_STATUS.set('fallback', AI_KEYS.gemini || AI_KEYS.openai ? AI_STATUS.lastError : 'No API key');
            return smartMockResponse(msg);
          };

          const send = async (overrideMsg) => {
            const raw = (overrideMsg ?? input).trim();
            if (!raw || loading) return;
            setInput('');
            setMessages(prev => [...prev, { role: 'user', content: raw }]);
            setLoading(true);

            // Update profile chat memory
            if (updateProfile) {
              const newTopics = extractTopics(raw);
              if (newTopics.length) {
                const merged = [...(profile?.chatTopics || []), ...newTopics];
                const dedup = [...new Set(merged)].slice(-12);
                updateProfile({ chatTopics: dedup });
              }
            }

            try {
              const response = await callMentor(raw, messages);
              setMessages(prev => [...prev, { role: 'assistant', content: response }]);
            } catch (e) {
              setMessages(prev => [...prev, { role: 'assistant', content: 'Sorry, I had trouble processing that. Try again!' }]);
            }
            setLoading(false);

            // Detect quest-change signals and adapt the active quest in the background.
            const signal = detectQuestSignal(raw);
            if (signal && dispatch && profile) {
              setAdaptingFromChat(true);
              const next = await adaptNextQuest({ profile, state, completedTask: null, signal, chatContext: raw });
              setAdaptingFromChat(false);
              if (next) {
                dispatch({ type: 'adapt_current_quest', quest: next, reason: `chat: ${signal}` });
                setMessages(prev => [...prev, {
                  role: 'assistant',
                  content: `Heard you. I just rewrote your active quest to be **${signal === 'easier' ? 'more approachable' : signal === 'harder' ? 'more ambitious' : signal === 'pivot' ? 'aligned with what you want' : 'sharper and more personal'}**: "${next.task}"`,
                }]);
              }
            }
          };

          return (
            <>
              <button
                onClick={() => setOpen(v => !v)}
                className="fixed bottom-6 right-6 z-50 w-14 h-14 rounded-full flex items-center justify-center focus-ring"
                style={{
                  background: 'linear-gradient(135deg, var(--primary-from), var(--primary-to))',
                  boxShadow: '0 8px 30px -6px rgba(255,107,44,0.6), inset 0 1px 0 rgba(255,255,255,0.4)',
                  transition: 'transform 200ms',
                  transform: open ? 'rotate(45deg) scale(0.9)' : 'scale(1)',

              >
                {open
                  ? <span style={{ color: '#1a0c00', fontSize: 24, fontWeight: 700 }}>+</span>
                  : <Sparkles size={22} style={{ color: '#1a0c00' }} strokeWidth={2.4} />
                }
              </button>

              {open && (
                <div className="fixed bottom-24 right-6 z-50 w-[400px] max-h-[580px] glass rounded-2xl overflow-hidden flex flex-col animate-fade-up" style={{ animationDuration: '0.3s', border: '1px solid rgba(255,138,61,0.15)' }}>
                  <div className="px-5 py-4 flex items-center gap-3" style={{ borderBottom: '1px solid var(--border)' }}>
                    <div className="w-9 h-9 rounded-xl flex items-center justify-center" style={{ background: 'linear-gradient(135deg, rgba(255,107,44,0.2), rgba(255,184,0,0.1))', border: '1px solid rgba(255,138,61,0.25)' }}>
                      <Sparkles size={16} style={{ color: '#FFC169' }} />
                    </div>
                    <div className="flex-1 min-w-0">
                      <div className="text-sm font-semibold flex items-center gap-2">
                        Forge AI Mentor
                        {adaptingFromChat && (
                          <span className="text-[10px] uppercase tracking-widest px-1.5 py-0.5 rounded-full" style={{ background: 'rgba(129,140,248,0.18)', color: '#C4C9FF', letterSpacing: '0.16em' }}>
                            Tuning quest…
                          </span>
                        )}
                      </div>
                      <div className="text-[11px] flex items-center gap-1.5 truncate" style={{ color: 'var(--text-subtle)' }}>
                        <span className="w-1.5 h-1.5 rounded-full shrink-0" style={{ background: '#34D399', boxShadow: '0 0 6px rgba(52,211,153,0.8)' }} />
                        {profile?.track ? `${TRACKS[profile.track]?.label} · ${LEVELS[profile.level]?.label}` : 'Online · ITHS Edition'}
                      </div>
                    </div>
                  </div>
                  <div className="flex-1 overflow-y-auto px-4 py-4 space-y-3" style={{ maxHeight: 360 }}>
                    {messages.map((m, i) => (
                      <div key={i} className={`flex ${m.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                        <div className="rounded-2xl px-4 py-2.5 text-[13px] leading-relaxed max-w-[85%] whitespace-pre-wrap" style={m.role === 'user' ? { background: 'linear-gradient(135deg, var(--primary-from), var(--primary-to))', color: '#1a0c00' } : { background: 'rgba(255,255,255,0.04)', border: '1px solid var(--border)', color: 'var(--text)' }}>
                          {m.content}
                        </div>
                      </div>
                    ))}
                    {loading && (
                      <div className="flex justify-start">
                        <div className="rounded-2xl px-4 py-3" style={{ background: 'rgba(255,255,255,0.04)', border: '1px solid var(--border)' }}>
                          <div className="flex gap-1.5">
                            {[0, 1, 2].map(j => (
                              <span key={j} className="w-2 h-2 rounded-full" style={{ background: 'var(--text-subtle)', animation: `fadeIn 0.6s ease ${j * 0.15}s infinite alternate` }} />
                            ))}
                          </div>
                        </div>
                      </div>
                    )}
                    <div ref={endRef} />
                  </div>
                  {/* Suggested prompts */}
                  {messages.length <= 1 && (
                    <div className="px-4 pb-2 flex flex-wrap gap-1.5">
                      {suggestions.map((s, i) => (
                        <button
                          key={i}
                          onClick={() => send(s)}
                          className="text-[11px] px-2.5 py-1 rounded-full focus-ring"
                          style={{
                            background: 'rgba(255,138,61,0.06)',
                            border: '1px solid rgba(255,138,61,0.2)',
                            color: '#FFC169',
                          }}
                        >
                          {s}
                        </button>
                      ))}
                    </div>
                  )}
                  <div className="px-4 py-3" style={{ borderTop: '1px solid var(--border)' }}>
                    <div className="flex gap-2">
                      <input
                        ref={inputRef}
                        value={input}
                        onChange={e => setInput(e.target.value)}
                        onKeyDown={e => e.key === 'Enter' && send()}
                        placeholder={profile?.track ? `Ask about ${TRACKS[profile.track]?.label.toLowerCase()}, careers, college…` : 'Ask about careers, skills, college…'}
                        className="input-minimal flex-1 py-2.5 px-3 rounded-xl text-sm focus:outline-none"
                        style={{ background: 'rgba(255,255,255,0.03)', border: '1px solid var(--border)' }}
                      />
                      <button
                        onClick={() => send()}
                        disabled={loading || !input.trim()}
                        className="w-10 h-10 rounded-xl flex items-center justify-center focus-ring"
                        style={{
                          background: input.trim() ? 'linear-gradient(135deg, var(--primary-from), var(--primary-to))' : 'rgba(255,255,255,0.03)',
                          border: input.trim() ? 'none' : '1px solid var(--border)',
                          opacity: loading ? 0.5 : 1,
                        }}
                      >
                        <ArrowRight size={16} style={{ color: input.trim() ? '#1a0c00' : 'var(--text-subtle)' }} strokeWidth={2.5} />
                      </button>
                    </div>
                    <div className="text-[10px] mt-2 text-center" style={{ color: 'var(--text-subtle)' }}>
                      Tell me "too hard", "too easy", or "switch to X" — I'll rewrite your active quest live.
                    </div>
                  </div>
                </div>
              )}
            </>
          );
        };

        /* ── State reducer ──────────────────────────────────────────────────────────── */
        const initialState = {
          xp: 0,
          xpToNext: 200,
          level: 1,
          streak: 0,
          currentWeek: 1,
          roadmap: MOCK_ROADMAP,
          wins: [],
        };

        const reducer = (state, action) => {
          if (action.type === "complete") {
            // Mark current week done, advance current to next, add XP, level up if needed
            const idx = state.roadmap.findIndex((w) => w.status === "current");
            if (idx === -1) return state;
            const newRoadmap = state.roadmap.map((w, i) => {
              if (i === idx) return { ...w, status: "done" };
              if (i === idx + 1) return { ...w, status: "current" };
              return w;
            });
            let xp = state.xp + action.xp;
            let level = state.level;
            let xpToNext = state.xpToNext;
            while (xp >= xpToNext) {
              xp -= xpToNext;
              level += 1;
              xpToNext = Math.round(xpToNext * 1.25);
            }
            const newWin = {
              title: state.roadmap[idx].task,
              xp: action.xp,
              when: "just now",
            };
            return {
              ...state,
              xp,
              xpToNext,
              level,
              streak: state.streak + 1,
              currentWeek: state.currentWeek + 1,
              roadmap: newRoadmap,
              wins: [newWin, ...state.wins].slice(0, 3),
            };
          }
          if (action.type === "adapt_current_quest") {
            // Replace the current (or next future) quest with an AI-rewritten version, mark adapted.
            const targetIdx = state.roadmap.findIndex(w => w.status === 'current');
            if (targetIdx === -1) return state;
            const newRoadmap = state.roadmap.map((w, i) =>
              i === targetIdx
                ? { ...w, ...action.quest, week: w.week, status: w.status, adapted: true, adaptReason: action.reason || null }
                : w
            );
            return { ...state, roadmap: newRoadmap, lastAdaptAt: Date.now() };
          }
          if (action.type === "set_roadmap") {
            return { ...state, roadmap: action.roadmap };
          }
          return state;
        };

        /* ── Auth / localStorage persistence ────────────────────────────────────── */
        const DB = {
          getUsers: () => JSON.parse(localStorage.getItem('forge_users') || '{}'),
          saveUsers: (u) => localStorage.setItem('forge_users', JSON.stringify(u)),
          getSession: () => JSON.parse(localStorage.getItem('forge_session') || 'null'),
          saveSession: (s) => localStorage.setItem('forge_session', JSON.stringify(s)),
          clearSession: () => localStorage.removeItem('forge_session'),
          signup: (name, email, pw) => {
            const users = DB.getUsers();
            if (users[email]) return { error: 'Account already exists' };
            users[email] = { name, email, password: pw, createdAt: Date.now() };
            DB.saveUsers(users);
            return { ok: true, user: { name, email } };
          },
          login: (email, pw) => {
            const users = DB.getUsers();
            const u = users[email];
            if (!u) return { error: 'No account found with that email' };
            if (u.password !== pw) return { error: 'Incorrect password' };
            return { ok: true, user: { name: u.name, email } };
          },
          saveData: (email, data) => {
            const all = JSON.parse(localStorage.getItem('forge_data') || '{}');
            all[email] = { ...data, savedAt: Date.now() };
            localStorage.setItem('forge_data', JSON.stringify(all));
          },
          loadData: (email) => {
            const all = JSON.parse(localStorage.getItem('forge_data') || '{}');
            return all[email] || null;
          },
        };

        /* ── Login / Signup Screen ──────────────────────────────────────────────── */
        const AuthScreen = ({ onAuth }) => {
          const [mode, setMode] = useState('login');
          const [name, setName] = useState('');
          const [email, setEmail] = useState('');
          const [pw, setPw] = useState('');
          const [error, setError] = useState('');
          const ref = useRef(null);
          useEffect(() => { ref.current?.focus(); }, [mode]);

          const submit = (e) => {
            e.preventDefault();
            setError('');
            if (mode === 'signup') {
              if (!name.trim() || !email.trim() || !pw.trim()) return setError('All fields are required');
              if (pw.length < 4) return setError('Password must be at least 4 characters');
              const r = DB.signup(name.trim(), email.trim().toLowerCase(), pw);
              if (r.error) return setError(r.error);
              DB.saveSession(r.user);
              onAuth(r.user);
            } else {
              if (!email.trim() || !pw.trim()) return setError('Email and password required');
              const r = DB.login(email.trim().toLowerCase(), pw);
              if (r.error) return setError(r.error);
              DB.saveSession(r.user);
              onAuth(r.user);
            }
          };

          return (
            <div className="min-h-screen flex items-center justify-center px-6 py-20">
              <div className="w-full max-w-md animate-fade-up">
                <div className="text-center mb-10">
                  <div className="inline-flex mb-5">
                    <div className="w-14 h-14 rounded-2xl flex items-center justify-center" style={{ background: 'linear-gradient(135deg, var(--primary-from), var(--primary-to))', boxShadow: '0 12px 36px -8px rgba(255,107,44,0.6)' }}>
                      <Hammer size={28} style={{ color: '#1a0c00' }} strokeWidth={2.4} />
                    </div>
                  </div>
                  <h1 className="font-display font-semibold tracking-tight mb-2" style={{ fontSize: 'clamp(28px, 4vw, 40px)', lineHeight: 1.05 }}>
                    {mode === 'login' ? 'Welcome back' : 'Create your account'}
                  </h1>
                  <p style={{ color: 'var(--text-muted)' }} className="text-sm">
                    {mode === 'login' ? 'Sign in to continue forging your career' : 'Start your 90-day career transformation'}
                  </p>
                </div>

                <form onSubmit={submit} className="glass top-rule rounded-3xl p-7 space-y-4">
                  {mode === 'signup' && (
                    <div>
                      <label className="text-xs uppercase tracking-widest block mb-2" style={{ color: 'var(--text-subtle)', letterSpacing: '0.18em' }}>Full Name</label>
                      <input value={name} onChange={e => setName(e.target.value)} placeholder="Your name"
                        className="input-minimal w-full py-3 px-4 rounded-xl text-sm focus:outline-none"
                        style={{ background: 'rgba(255,255,255,0.03)', border: '1px solid var(--border)' }} />
                    </div>
                  )}
                  <div>
                    <label className="text-xs uppercase tracking-widest block mb-2" style={{ color: 'var(--text-subtle)', letterSpacing: '0.18em' }}>Email</label>
                    <input ref={ref} type="email" value={email} onChange={e => setEmail(e.target.value)} placeholder="you@iths.edu"
                      className="input-minimal w-full py-3 px-4 rounded-xl text-sm focus:outline-none"
                      style={{ background: 'rgba(255,255,255,0.03)', border: '1px solid var(--border)' }} />
                  </div>
                  <div>
                    <label className="text-xs uppercase tracking-widest block mb-2" style={{ color: 'var(--text-subtle)', letterSpacing: '0.18em' }}>Password</label>
                    <input type="password" value={pw} onChange={e => setPw(e.target.value)} placeholder="••••••••"
                      className="input-minimal w-full py-3 px-4 rounded-xl text-sm focus:outline-none"
                      style={{ background: 'rgba(255,255,255,0.03)', border: '1px solid var(--border)' }} />
                  </div>
                  {error && (
                    <div className="text-sm px-4 py-2.5 rounded-xl" style={{ background: 'rgba(244,63,94,0.1)', border: '1px solid rgba(244,63,94,0.2)', color: '#F43F5E' }}>{error}</div>
                  )}
                  <PrimaryButton type="submit" large className="w-full">
                    {mode === 'login' ? 'Sign in' : 'Create account'} <ArrowRight size={16} strokeWidth={2.5} />
                  </PrimaryButton>
                </form>
                <p className="text-center text-sm mt-6" style={{ color: 'var(--text-muted)' }}>
                  {mode === 'login' ? "Don't have an account? " : 'Already have an account? '}
                  <button onClick={() => { setMode(mode === 'login' ? 'signup' : 'login'); setError(''); }}
                    className="font-medium hover:underline" style={{ color: '#FFC169' }}>
                    {mode === 'login' ? 'Sign up' : 'Sign in'}
                  </button>
                </p>
              </div>
            </div>
          );
        };

        /* ── Main App ───────────────────────────────────────────────────────────── */
        function App() {
          const [user, setUser] = useState(null);
          const [screen, setScreen] = useState("landing");
          const [state, setState] = useState(initialState);
          const [profile, setProfile] = useState(null);
          const [loaded, setLoaded] = useState(false);

          useEffect(() => {
            const session = DB.getSession();
            if (session) {
              setUser(session);
              const saved = DB.loadData(session.email);
              if (saved && saved.profile?.goal) {
                setState(saved.state || initialState);
                setProfile(saved.profile);
                setScreen('dashboard');
              } else if (saved && saved.goal) {
                // legacy migration: old shape stored bare goal
                setState(saved.state || initialState);
                setProfile({ goal: saved.goal, track: 'web', level: 'beginner', timeCommitment: '10', outcome: 'portfolio', chatTopics: [] });
                setScreen('dashboard');
              } else {
                setScreen('onboarding');
              }
            }
            setLoaded(true);
          }, []);

          useEffect(() => {
            if (user && profile?.goal && screen === 'dashboard') {
              DB.saveData(user.email, { state, profile });
            }
          }, [state, profile, user, screen]);

          const dispatch = useCallback((action) => {
            setState((s) => reducer(s, action));
          }, []);

          const updateProfile = useCallback((patch) => {
            setProfile(p => p ? { ...p, ...patch } : p);
          }, []);

          const navigate = (next) => {
            setScreen(next);
            if (next !== "landing") window.scrollTo({ top: 0, behavior: "smooth" });
          };

          const startFlow = () => navigate(user ? "onboarding" : "auth");

          const onAuth = (u) => {
            setUser(u);
            const saved = DB.loadData(u.email);
            if (saved && saved.profile?.goal) {
              setState(saved.state || initialState);
              setProfile(saved.profile);
              navigate('dashboard');
            } else {
              navigate('onboarding');
            }
          };

          const signOut = () => {
            DB.clearSession();
            setUser(null);
            setState(initialState);
            setProfile(null);
            navigate('landing');
          };

          const onProfileSubmit = (p) => {
            setProfile({ ...p, chatTopics: [] });
            navigate('forging');
          };
          const onForgeDone = (generatedRoadmap) => {
            if (generatedRoadmap && Array.isArray(generatedRoadmap)) {
              setState({
                xp: 50,
                xpToNext: 200,
                level: 1,
                streak: 1,
                currentWeek: 1,
                roadmap: generatedRoadmap,
                wins: [
                  { title: 'Set your goal: "' + (profile?.goal || '') + '"', xp: 50, when: 'just now' },
                ],
              });
            }
            navigate("dashboard");
          };

          if (!loaded) return null;

          return (
            <>
              <GlobalStyles />
              <AmbientBackground />
              <div key={screen} className="animate-fade-in">
                {screen === "landing" && <Landing onStart={startFlow} />}
                {screen === "auth" && <AuthScreen onAuth={onAuth} />}
                {screen === "onboarding" && <Onboarding onSubmit={onProfileSubmit} />}
                {screen === "forging" && <ForgingLoader profile={profile} onDone={onForgeDone} />}
                {screen === "dashboard" && (
                  <Dashboard state={state} dispatch={dispatch} onNav={navigate} profile={profile} user={user} signOut={signOut} />
                )}
                {screen === "portfolio" && <Portfolio onNav={navigate} state={state} user={user} signOut={signOut} />}
                {screen === "roadmap" && <Roadmap onNav={navigate} state={state} user={user} signOut={signOut} />}
                {screen === "leaderboard" && <Leaderboard onNav={navigate} state={state} user={user} signOut={signOut} />}
              </div>
              {screen !== 'landing' && screen !== 'onboarding' && screen !== 'forging' && screen !== 'auth' && (
                <ChatPanel profile={profile} state={state} dispatch={dispatch} updateProfile={updateProfile} />
              )}
            </>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
