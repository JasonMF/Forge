        const { 
            useState, useEffect, useRef, useCallback, useMemo, Fragment

        const {
            ArrowRight,
            Flame,
            Sparkles,
            Target,
            Trophy,
            Check,
            Github,
            Hammer,
            Zap,
            Compass,
            Rocket,
            Copy,

        /* ────────────────────────────────────────────────────────────────────────────
           FORGE — AI-powered career copilot for ITHS students
           Built for the "Make ITHS Better" Hackathon 2026
           ──────────────────────────────────────────────────────────────────────────── */

        /* ── AI Service Layer ───────────────────────────────────────────────────────── */
        const AI_CONFIG = {
          provider: 'gemini',
          geminiKey: 'AIzaSyCan43RuVjvyHE1T3ohTDzwXb_H0Ghdp6E',
          openaiKey: '',
          geminiUrl: 'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent',
          openaiUrl: 'https://api.openai.com/v1/chat/completions',
        };

        const callAI = async (prompt, systemPrompt = '') => {
          const sys = systemPrompt || 'You are Forge AI, a career mentor built for students at Information Technology High School (ITHS) in Long Island City, NYC. You give specific, actionable advice about tech careers, college prep, portfolio building, and skill development. Be encouraging but direct. Keep responses concise (2-4 sentences unless asked for more).';
          
          if (AI_CONFIG.geminiKey) {
            try {
              const res = await fetch(`${AI_CONFIG.geminiUrl}?key=${AI_CONFIG.geminiKey}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                  system_instruction: { parts: [{ text: sys }] },
                  contents: [{ parts: [{ text: prompt }] }],
                  generationConfig: { temperature: 0.8, maxOutputTokens: 1024 }
                })
              });
              const data = await res.json();
              return data.candidates?.[0]?.content?.parts?.[0]?.text || 'AI response unavailable.';
            } catch (e) { console.warn('Gemini error:', e); }
          }
          if (AI_CONFIG.openaiKey) {
            try {
              const res = await fetch(AI_CONFIG.openaiUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${AI_CONFIG.openaiKey}` },
                body: JSON.stringify({
                  model: 'gpt-4o-mini',
                  messages: [{ role: 'system', content: sys }, { role: 'user', content: prompt }],
                  max_tokens: 1024, temperature: 0.8
                })
              });
              const data = await res.json();
              return data.choices?.[0]?.message?.content || 'AI response unavailable.';
            } catch (e) { console.warn('OpenAI error:', e); }
          }
          return smartMockResponse(prompt);
        };

        const smartMockResponse = (prompt) => {
          const p = prompt.toLowerCase();
          if (p.includes('roadmap') || p.includes('plan') || p.includes('goal')) {
            return JSON.stringify([
              { week: 1, title: 'Foundation Sprint', task: 'Set up your dev environment, create a GitHub profile, and push your first repo with a professional README', xp: 80 },
              { week: 2, title: 'Build Something Real', task: 'Create a personal portfolio website showcasing 3 projects — deploy it live on GitHub Pages', xp: 150 },
              { week: 3, title: 'Version Control Mastery', task: 'Learn branching, pull requests, and contribute to one open-source issue on GitHub', xp: 180 },
              { week: 4, title: 'Frontend Deep Dive', task: 'Build a responsive React component library with at least 5 reusable components', xp: 200 },
              { week: 5, title: 'API Integration', task: 'Connect your project to a public API and build a data-driven feature', xp: 220 },
              { week: 6, title: 'Database Fundamentals', task: 'Add persistent storage to your app using Firebase or Supabase', xp: 240 },
              { week: 7, title: 'Auth & Security', task: 'Implement user authentication with Google/GitHub OAuth in your project', xp: 260 },
              { week: 8, title: 'Build in Public', task: 'Write a build log, share your progress on social media, and get feedback', xp: 280 },
              { week: 9, title: 'Internship Prep', task: 'Research 10 companies, tailor your resume, and send 5 outreach emails', xp: 300 },
              { week: 10, title: 'Interview Ready', task: 'Complete 5 LeetCode problems and do 2 mock behavioral interviews', xp: 320 },
              { week: 11, title: 'Portfolio Polish', task: 'Refine your top 3 projects, record demo videos, and write case studies', xp: 340 },
              { week: 12, title: 'Launch & Apply', task: 'Submit applications to 6 programs/internships and celebrate your growth', xp: 400 },
            ]);
          }
          if (p.includes('portfolio') || p.includes('github') || p.includes('bullet') || p.includes('resume')) {
            const bullets = [
              'Architected and deployed a full-stack web application using React, Node.js, and PostgreSQL — featuring real-time data sync, OAuth authentication, and CI/CD pipeline via GitHub Actions. Achieved 200+ active users within the first month through strategic community outreach.',
              'Designed and built a responsive portfolio platform with dynamic project showcases, interactive skill visualizations, and automated deployment. Leveraged modern CSS techniques including glassmorphism and micro-animations for a premium user experience.',
              'Developed an AI-powered productivity tool that generates personalized learning roadmaps using the Gemini API. Implemented a gamification system with XP tracking, streak mechanics, and achievement unlocks to drive consistent user engagement.'
            ];
            return bullets[Math.floor(Math.random() * bullets.length)];
          }
          if (p.includes('react') || p.includes('learn') || p.includes('skill')) return 'For an ITHS student, I recommend starting with React fundamentals — build 3 small projects before moving to Next.js. Focus on component thinking, state management with hooks, and API integration. Your ITHS coursework gives you a strong foundation to build on.';
          if (p.includes('college') || p.includes('university')) return 'Top CS programs like Cornell Tech, NYU Tandon, and Stony Brook look for students with real projects, not just grades. Build 2-3 polished portfolio projects, contribute to open source, and write about what you learned. Your ITHS background in IT already sets you apart.';
          if (p.includes('internship') || p.includes('job')) return 'Start with local NYC startups — they love hungry ITHS students. Check AngelList, LinkedIn, and Handshake. Lead with your projects, not your GPA. A deployed app is worth more than a 4.0 to most tech companies.';
          return 'Great question! As an ITHS student, you have a unique advantage — you\'re already in a tech-focused environment. Focus on building real projects, contributing to open source, and connecting with the NYC tech community. Every line of code you ship is a step closer to your goal.';
        };

        const generateRoadmap = async (goal) => {
          const prompt = `Generate a 12-week career roadmap for an ITHS (Information Technology High School) student whose goal is: "${goal}".

Return ONLY a valid JSON array with exactly 12 objects. Each object must have these exact keys:
- "week": number (1-12)
- "title": string (3-5 words, catchy title)
- "task": string (one specific actionable task, 15-25 words)
- "xp": number (starting at 80, increasing by 20-40 each week)

Example format:
[{"week":1,"title":"Setup Sprint","task":"Install VS Code, create GitHub account, and push your first repo","xp":80}]

Important: Output ONLY the JSON array. No markdown, no explanation, no code fences.`;
          
          try {
            const response = await callAI(prompt, 'You are a JSON API. You output ONLY valid JSON arrays. Never use markdown formatting. Never add explanation text. Output raw JSON only.');
            // Try multiple extraction strategies
            let jsonStr = response;
            // Remove markdown code fences
            jsonStr = jsonStr.replace(/```json\s*/gi, '').replace(/```\s*/g, '');
            // Try to find the array in the response
            const arrayMatch = jsonStr.match(/\[[\s\S]*\]/);
            if (arrayMatch) jsonStr = arrayMatch[0];
            jsonStr = jsonStr.trim();
            
            const parsed = JSON.parse(jsonStr);
            if (Array.isArray(parsed) && parsed.length >= 8) {
              return parsed.slice(0, 12);
            }
          } catch (e) { 
            console.warn('AI roadmap parse error, using smart fallback:', e); 
          }
          return JSON.parse(smartMockResponse('roadmap'));
        };

        const generateBullet = async (url) => {
          const prompt = `Generate a professional resume bullet point for a high school student's portfolio based on this GitHub project: ${url}. Write ONE impressive, specific bullet point (2-3 sentences) that highlights technical skills, impact, and technologies used. Make it sound like a top CS applicant wrote it.`;
          return await callAI(prompt);
        };

        const chatWithMentor = async (message, history = []) => {
          const context = history.slice(-6).map(m => `${m.role}: ${m.content}`).join('\n');
          const prompt = context ? `Previous conversation:\n${context}\n\nStudent: ${message}` : message;
          return await callAI(prompt);
        };

        /* ── Animated number count-up ───────────────────────────────────────────────── */
        const useCountUp = (target, duration = 900) => {
          const [val, setVal] = useState(target);
          const fromRef = useRef(target);
          const rafRef = useRef();
          useEffect(() => {
            const from = fromRef.current;
            if (from === target) return;
            const start = performance.now();
            const tick = (now) => {
              const t = Math.min(1, (now - start) / duration);
              // easeOutCubic
              const e = 1 - Math.pow(1 - t, 3);
              setVal(Math.round(from + (target - from) * e));
              if (t < 1) rafRef.current = requestAnimationFrame(tick);
              else fromRef.current = target;
            };
            rafRef.current = requestAnimationFrame(tick);
            return () => cancelAnimationFrame(rafRef.current);
          }, [target, duration]);
          return val;
        };

        /* ── Confetti — pure-canvas warm-gradient particle burst ────────────────────── */
        const Confetti = ({ trigger }) => {
          const canvasRef = useRef(null);
          useEffect(() => {
            if (!trigger) return;
            const canvas = canvasRef.current;
            if (!canvas) return;
            const ctx = canvas.getContext("2d");
            const dpr = window.devicePixelRatio || 1;
            const resize = () => {
              canvas.width = canvas.offsetWidth * dpr;
              canvas.height = canvas.offsetHeight * dpr;
            };
            resize();
            window.addEventListener("resize", resize);

            const W = () => canvas.width;
            const H = () => canvas.height;
            const cx = W() / 2;
            const cy = H() * 0.42;

            const colors = ["#FF6B2C", "#FF8A3D", "#FFB800", "#FFD166", "#FFF1B8"];
            const particles = [];
            const count = 140;
            for (let i = 0; i < count; i++) {
              const angle = (Math.PI * 2 * i) / count + Math.random() * 0.4;
              const speed = 4 + Math.random() * 9;
              particles.push({
                x: cx,
                y: cy,
                vx: Math.cos(angle) * speed * dpr,
                vy: Math.sin(angle) * speed * dpr - 4 * dpr,
                size: (3 + Math.random() * 5) * dpr,
                rot: Math.random() * Math.PI,
                vr: (Math.random() - 0.5) * 0.3,
                color: colors[Math.floor(Math.random() * colors.length)],
                life: 1,
                shape: Math.random() > 0.5 ? "rect" : "circ",
              });
            }

            let raf;
            const gravity = 0.18 * dpr;
            const drag = 0.992;
            const draw = () => {
              ctx.clearRect(0, 0, W(), H());
              let alive = 0;
              for (const p of particles) {
                if (p.life <= 0) continue;
                alive++;
                p.vy += gravity;
                p.vx *= drag;
                p.vy *= drag;
                p.x += p.vx;
                p.y += p.vy;
                p.rot += p.vr;
                p.life -= 0.012;

                ctx.save();
                ctx.translate(p.x, p.y);
                ctx.rotate(p.rot);
                ctx.globalAlpha = Math.max(0, p.life);
                ctx.fillStyle = p.color;
                if (p.shape === "rect") {
                  ctx.fillRect(-p.size, -p.size * 0.4, p.size * 2, p.size * 0.8);
                } else {
                  ctx.beginPath();
                  ctx.arc(0, 0, p.size, 0, Math.PI * 2);
                  ctx.fill();
                }
                ctx.restore();
              }
              if (alive > 0) raf = requestAnimationFrame(draw);
            };
            raf = requestAnimationFrame(draw);
            return () => {
              cancelAnimationFrame(raf);
              window.removeEventListener("resize", resize);
              ctx.clearRect(0, 0, W(), H());
            };
          }, [trigger]);

          return (
            <canvas
              ref={canvasRef}
              className="fixed inset-0 pointer-events-none z-50"
              style={{ width: "100vw", height: "100vh" }}
            />
          );

        /* ── Portfolio generator ───────────────────────────────────────────────────── */
        const Portfolio = ({ onNav, state, user, signOut }) => {
          const [url, setUrl] = useState("");
          const [loading, setLoading] = useState(false);
          const [bullet, setBullet] = useState("");
          const [copied, setCopied] = useState(false);
          const [savedBullets, setSavedBullets] = useState([]);
          const [editIdx, setEditIdx] = useState(null);
          const [editText, setEditText] = useState("");

          // Load saved portfolio from localStorage
          useEffect(() => {
            if (user?.email) {
              const saved = JSON.parse(localStorage.getItem('forge_portfolio_' + user.email) || '[]');
              setSavedBullets(saved);
            }
          }, [user]);

          // Persist whenever savedBullets changes
          useEffect(() => {
            if (user?.email && savedBullets.length >= 0) {
              localStorage.setItem('forge_portfolio_' + user.email, JSON.stringify(savedBullets));
            }
          }, [savedBullets, user]);

          const generate = async () => {
            if (!url.trim()) return;
            setLoading(true);
            setBullet("");
            try {
              const result = await generateBullet(url.trim());
              setBullet(result);
            } catch (e) {
              setBullet('Unable to generate bullet. Please try again.');
            }
            setLoading(false);
          };

          const copy = (text) => {
            navigator.clipboard?.writeText(text || bullet);
            setCopied(true);
            setTimeout(() => setCopied(false), 1800);
          };

          const saveBullet = () => {
            if (!bullet) return;
            setSavedBullets(prev => [{ url: url.trim(), bullet, savedAt: Date.now() }, ...prev]);
            setBullet("");
            setUrl("");
          };

          const deleteBullet = (idx) => {
            setSavedBullets(prev => prev.filter((_, i) => i !== idx));
          };

          const startEdit = (idx) => {
            setEditIdx(idx);
            setEditText(savedBullets[idx].bullet);
          };

          const saveEdit = () => {
            setSavedBullets(prev => prev.map((b, i) => i === editIdx ? { ...b, bullet: editText } : b));
            setEditIdx(null);
            setEditText("");
          };

          const copyAll = () => {
            const all = savedBullets.map(b => '• ' + b.bullet).join('\n');
            navigator.clipboard?.writeText(all);
            setCopied(true);
            setTimeout(() => setCopied(false), 1800);
          };

          return (
            <div>
              <TopBar xp={state.xp} level={state.level} streak={state.streak} onNav={onNav} onProfile={() => {}} user={user} signOut={signOut} />
              <main className="max-w-4xl mx-auto px-6 py-12">
                <div className="mb-10 animate-fade-up">
                  <div className="inline-flex mb-4">
                    <GradientIcon Icon={Github} size={20} />
                  </div>
                  <h1 className="font-display font-semibold tracking-tight mb-2" style={{ fontSize: "clamp(32px, 4vw, 44px)", lineHeight: 1.05 }}>
                    Portfolio builder
                  </h1>
                  <p style={{ color: "var(--text-muted)" }} className="max-w-xl">
                    Paste a GitHub repo URL. Forge uses AI to read your README and generate a sharp,
                    recruiter-ready resume bullet. Save, edit, and build your portfolio.
                  </p>
                </div>

                {/* Generator */}
                <div className="glass top-rule rounded-3xl p-6 md:p-7 animate-fade-up" style={{ animationDelay: "0.1s", animationFillMode: "both" }}>
                  <label className="text-xs uppercase tracking-widest block mb-3" style={{ color: "var(--text-subtle)", letterSpacing: "0.2em" }}>
                    GitHub URL
                  </label>
                  <div className="flex flex-col sm:flex-row items-stretch gap-3 p-2 rounded-2xl" style={{ background: "rgba(255,255,255,0.025)", border: "1px solid var(--border)" }}>
                    <div className="flex items-center gap-3 flex-1 px-3">
                      <Github size={16} style={{ color: "var(--text-subtle)" }} />
                      <input value={url} onChange={(e) => setUrl(e.target.value)} onKeyDown={(e) => e.key === "Enter" && generate()}
                        placeholder="https://github.com/yourname/your-project" className="input-minimal flex-1 py-3 text-base focus:outline-none" />
                    </div>
                    <PrimaryButton onClick={generate}>
                      {loading ? "Generating…" : "Generate bullet"}
                      {!loading && <ArrowRight size={15} strokeWidth={2.5} />}
                    </PrimaryButton>
                  </div>
                </div>

                {/* Result */}
                <div className="mt-6">
                  {loading && (
                    <div className="glass top-rule rounded-3xl p-7 animate-fade-up">
                      <div className="flex items-center gap-3 mb-4">
                        <Sparkles size={15} style={{ color: "#FFC169" }} />
                        <span className="text-sm grad-text-shimmer font-medium">Reading your README…</span>
                      </div>
                      <div className="space-y-3">
                        <div className="h-3 rounded-full w-11/12" style={{ background: "rgba(255,255,255,0.04)" }} />
                        <div className="h-3 rounded-full w-10/12" style={{ background: "rgba(255,255,255,0.04)" }} />
                        <div className="h-3 rounded-full w-8/12" style={{ background: "rgba(255,255,255,0.04)" }} />
                      </div>
                    </div>
                  )}

                  {bullet && !loading && (
                    <div className="relative glass top-rule rounded-3xl p-7 animate-fade-up" style={{ animationDuration: "0.6s" }}>
                      <div className="absolute inset-0 rounded-3xl pointer-events-none" style={{
                        padding: 1, background: "linear-gradient(135deg, rgba(255,107,44,0.5), rgba(255,184,0,0.3), rgba(129,140,248,0.3))",
                        WebkitMask: "linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0)", WebkitMaskComposite: "xor", maskComposite: "exclude",
                      }} />
                      <div className="flex items-center justify-between mb-5">
                        <div className="flex items-center gap-2">
                          <Sparkles size={15} style={{ color: "#FFC169" }} />
                          <span className="text-xs uppercase tracking-widest" style={{ color: "#FFC169", letterSpacing: "0.18em" }}>Generated bullet</span>
                        </div>
                        <div className="flex items-center gap-2">
                          <button onClick={() => copy()} className="flex items-center gap-1.5 px-3 py-1.5 rounded-full text-xs focus-ring transition-colors"
                            style={{ background: "rgba(255,255,255,0.03)", border: "1px solid var(--border)", color: copied ? "#34D399" : "var(--text-muted)" }}>
                            {copied ? <Check size={13} strokeWidth={2.6} /> : <Copy size={13} />} {copied ? "Copied" : "Copy"}
                          </button>
                          <button onClick={saveBullet} className="flex items-center gap-1.5 px-3 py-1.5 rounded-full text-xs focus-ring transition-colors"
                            style={{ background: "rgba(255,138,61,0.1)", border: "1px solid rgba(255,138,61,0.25)", color: "#FFC169" }}>
                            <Check size={13} strokeWidth={2.6} /> Save to portfolio
                          </button>
                        </div>
                      </div>
                      <p className="text-lg leading-relaxed" style={{ letterSpacing: "-0.01em" }}>{bullet}</p>
                    </div>
                  )}

                  {!loading && !bullet && savedBullets.length === 0 && (
                    <div className="mt-6 flex flex-col items-center text-center py-10">
                      <div className="w-16 h-16 rounded-2xl flex items-center justify-center mb-4" style={{
                        background: "radial-gradient(circle at 30% 30%, rgba(255,107,44,0.18), rgba(255,107,44,0.03))", border: "1px solid rgba(255,138,61,0.18)",
                      }}>
                        <Github size={26} style={{ color: "#FFC169" }} />
                      </div>
                      <p className="text-sm" style={{ color: "var(--text-muted)" }}>
                        Paste a GitHub URL above to generate your first bullet.
                      </p>
                    </div>
                  )}
                </div>

                {/* Saved Portfolio */}
                {savedBullets.length > 0 && (
                  <div className="mt-12 animate-fade-up" style={{ animationDelay: "0.15s", animationFillMode: "both" }}>
                    <div className="flex items-center justify-between mb-6">
                      <div>
                        <h2 className="font-display font-semibold text-xl tracking-tight">Your portfolio</h2>
                        <p className="text-sm mt-1" style={{ color: "var(--text-muted)" }}>{savedBullets.length} project{savedBullets.length !== 1 ? 's' : ''} saved</p>
                      </div>
                      <button onClick={copyAll} className="flex items-center gap-1.5 px-4 py-2 rounded-full text-sm focus-ring transition-colors"
                        style={{ background: "rgba(255,255,255,0.03)", border: "1px solid var(--border)", color: "var(--text-muted)" }}>
                        <Copy size={14} /> Copy all
                      </button>
                    </div>

                    <div className="space-y-3">
                      {savedBullets.map((item, i) => (
                        <div key={item.savedAt + i} className="glass top-rule rounded-2xl p-5 group" style={{ animation: `fadeUp 0.4s cubic-bezier(.2,.8,.2,1) ${0.04 * i}s both` }}>
                          {editIdx === i ? (
                            <div>
                              <textarea value={editText} onChange={e => setEditText(e.target.value)} rows={3}
                                className="input-minimal w-full p-3 rounded-xl text-sm focus:outline-none mb-3"
                                style={{ background: "rgba(255,255,255,0.03)", border: "1px solid var(--border)" }} />
                              <div className="flex gap-2">
                                <button onClick={saveEdit} className="px-3 py-1.5 rounded-full text-xs" style={{ background: "rgba(52,211,153,0.1)", border: "1px solid rgba(52,211,153,0.3)", color: "#34D399" }}>Save</button>
                                <button onClick={() => setEditIdx(null)} className="px-3 py-1.5 rounded-full text-xs" style={{ background: "rgba(255,255,255,0.03)", border: "1px solid var(--border)", color: "var(--text-muted)" }}>Cancel</button>
                              </div>
                            </div>
                          ) : (
                            <div>
                              <div className="flex items-start justify-between gap-4">
                                <p className="text-sm leading-relaxed flex-1">{item.bullet}</p>
                                <div className="flex items-center gap-1.5 shrink-0 opacity-0 group-hover:opacity-100 transition-opacity">
                                  <button onClick={() => copy(item.bullet)} className="p-1.5 rounded-lg hover:bg-white/5" title="Copy">
                                    <Copy size={13} style={{ color: "var(--text-subtle)" }} />
                                  </button>
                                  <button onClick={() => startEdit(i)} className="p-1.5 rounded-lg hover:bg-white/5" title="Edit">
                                    <Settings size={13} style={{ color: "var(--text-subtle)" }} />
                                  </button>
                                  <button onClick={() => deleteBullet(i)} className="p-1.5 rounded-lg hover:bg-white/5" title="Delete">
                                    <LogOut size={13} style={{ color: "var(--danger)" }} />
                                  </button>
                                </div>
                              </div>
                              {item.url && (
                                <div className="flex items-center gap-2 mt-3 text-xs" style={{ color: "var(--text-subtle)" }}>
                                  <Github size={11} />
                                  <span className="truncate">{item.url}</span>
                                  <span>·</span>
                                  <span>{new Date(item.savedAt).toLocaleDateString()}</span>
                                </div>
                              )}
                            </div>
                          )}
                        </div>
                      ))}
                    </div>
                  </div>
                )}
              </main>
            </div>
          );
        };

        /* ── Roadmap full page ──────────────────────────────────────────────────────── */
        const Roadmap = ({ onNav, state, user, signOut }) => (
          <div>
            <TopBar xp={state.xp} level={state.level} streak={state.streak} onNav={onNav} onProfile={() => {}} user={user} signOut={signOut} />
            <main className="max-w-3xl mx-auto px-6 py-12">
              <div className="mb-10 animate-fade-up">
                <div className="inline-flex mb-4">
                  <GradientIcon Icon={Compass} size={20} />
                </div>
                <h1 className="font-display font-semibold tracking-tight mb-2" style={{ fontSize: "clamp(32px, 4vw, 44px)", lineHeight: 1.05 }}>
                  Your 12-week roadmap
                </h1>
                <p style={{ color: "var(--text-muted)" }} className="max-w-xl">
                  A system, not a wish-list. Stay on the current week — momentum compounds.
                </p>
              </div>

              <ol className="relative space-y-3">
                {state.roadmap.map((w, i) => {
                  const isDone = w.status === "done";
                  const isCurrent = w.status === "current";
                  return (
                    <li
                      key={w.week}
                      className="glass top-rule rounded-2xl p-5 flex items-start gap-5"
                      style={{
                        animation: `fadeUp 0.6s cubic-bezier(.2,.8,.2,1) ${i * 0.04 + 0.05}s both`,
                        borderColor: isCurrent ? "rgba(255,138,61,0.28)" : "var(--border)",
                      }}
                    >
                      <span
                        className="shrink-0 w-12 h-12 rounded-xl flex flex-col items-center justify-center text-xs font-medium tabular"
                        style={
                          isDone
                            ? {
                                background: "linear-gradient(135deg, rgba(255,184,0,0.2), rgba(255,107,44,0.12))",
                                border: "1px solid rgba(255,184,0,0.35)",
                                color: "#FFD166",
                              }
                            : isCurrent
                            ? {
                                background: "linear-gradient(135deg, var(--primary-from), var(--primary-to))",
                                color: "#1a0c00",
                                boxShadow: "0 8px 22px -6px rgba(255,107,44,0.55)",
                              }
                            : {
                                background: "rgba(255,255,255,0.025)",
                                border: "1px solid var(--border)",
                                color: "var(--text-subtle)",
                              }
                        }
                      >
                        <span style={{ fontSize: 9, letterSpacing: "0.14em", opacity: 0.8 }}>WK</span>
                        <span className="font-display font-semibold text-base">{w.week}</span>
                      </span>
                      <div className="flex-1 min-w-0">
                        <div className="flex items-center gap-2 mb-1">
                          <h3 className="font-display text-lg font-semibold tracking-tight">{w.title}</h3>
                          {isCurrent && (
                            <span
                              className="text-[10px] uppercase tracking-widest px-2 py-0.5 rounded-full"
                              style={{
                                background: "rgba(255,138,61,0.14)",
                                color: "#FFC169",
                                letterSpacing: "0.2em",
                              }}
                            >
                              Now
                            </span>
                          )}
                          {isDone && (
                            <span
                              className="text-[10px] uppercase tracking-widest px-2 py-0.5 rounded-full"
                              style={{
                                background: "rgba(52,211,153,0.12)",
                                color: "#34D399",
                                letterSpacing: "0.2em",
                              }}
                            >
                              Done
                            </span>
                          )}
                        </div>
                        <p className="text-sm" style={{ color: isDone || isCurrent ? "var(--text-muted)" : "var(--text-subtle)" }}>
                          {w.task}
                        </p>
                      </div>
                      <div className="text-right shrink-0">
                        <div className="text-base font-semibold tabular grad-text">+{w.xp}</div>
                        <div className="text-[10px] uppercase tracking-widest" style={{ color: "var(--text-subtle)", letterSpacing: "0.2em" }}>
                          XP
                        </div>
                      </div>
                    </li>
                  );
                })}
              </ol>
            </main>
          </div>
        );

        /* ── Leaderboard ─────────────────────────────────────────────────────────── */
        const MOCK_LEADERBOARD = [
          { rank: 1, name: 'Sarah K.', xp: 2840, level: 8, streak: 45, goal: 'Cornell Tech CS' },
          { rank: 2, name: 'David L.', xp: 2650, level: 7, streak: 38, goal: 'Google internship' },
          { rank: 3, name: 'Maya R.', xp: 2420, level: 7, streak: 32, goal: 'NYU Tandon' },
          { rank: 4, name: 'Brandon D.', xp: 2100, level: 6, streak: 28, goal: 'Startup founder' },
          { rank: 5, name: 'James W.', xp: 1890, level: 5, streak: 22, goal: 'Cybersecurity career' },
          { rank: 6, name: 'Aisha N.', xp: 1650, level: 5, streak: 19, goal: 'UI/UX at a startup' },
          { rank: 7, name: 'Carlos M.', xp: 1440, level: 4, streak: 15, goal: 'Full-stack developer' },
          { rank: 8, name: 'Emily T.', xp: 1200, level: 4, streak: 12, goal: 'Data science path' },
          { rank: 9, name: 'Ryan P.', xp: 980, level: 3, streak: 9, goal: 'Game development' },
          { rank: 10, name: 'Zoe H.', xp: 720, level: 3, streak: 7, goal: 'Stony Brook CS' },
        ];

        const Leaderboard = ({ onNav, state, user, signOut }) => (
          <div>
            <TopBar xp={state.xp} level={state.level} streak={state.streak} onNav={onNav} onProfile={() => {}} user={user} signOut={signOut} />
            <main className="max-w-4xl mx-auto px-6 py-12">
              <div className="mb-10 animate-fade-up">
                <div className="inline-flex mb-4"><GradientIcon Icon={Trophy} size={20} /></div>
                <h1 className="font-display font-semibold tracking-tight mb-2" style={{ fontSize: 'clamp(32px, 4vw, 44px)', lineHeight: 1.05 }}>
                  ITHS Leaderboard
                </h1>
                <p style={{ color: 'var(--text-muted)' }} className="max-w-xl">See who's forging the hardest. XP earned from completed quests this semester.</p>
              </div>
              <div className="grid grid-cols-3 gap-4 mb-8" style={{ animation: 'fadeUp 0.7s cubic-bezier(.2,.8,.2,1) 0.1s both' }}>
                {[MOCK_LEADERBOARD[1], MOCK_LEADERBOARD[0], MOCK_LEADERBOARD[2]].map((s, i) => {

                      <span className="flex items-center gap-1" style={{ color: 'var(--text-muted)' }}><Flame size={12} style={{ color: '#FF8A3D' }} />{s.streak}</span>
                      <span className="flex items-center gap-1" style={{ color: 'var(--text-muted)' }}><Trophy size={12} style={{ color: '#FFC169' }} />Lv{s.level}</span>
                      <span className="font-semibold grad-text min-w-[60px] text-right">{s.xp.toLocaleString()} XP</span>
                    </div>
                  </div>
                ))}
              </div>
            </main>
          </div>
        );

        /* ── AI Chat Panel ──────────────────────────────────────────────────────── */
        const ChatPanel = () => {
          const [open, setOpen] = useState(false);
          const [messages, setMessages] = useState([
            { role: 'assistant', content: 'Hey! I\'m your Forge AI mentor, built for ITHS students. Ask me anything about tech careers, college prep, coding skills, or portfolio building.' }
          ]);
          const [input, setInput] = useState('');
          const [loading, setLoading] = useState(false);
          const endRef = useRef(null);
          const inputRef = useRef(null);

          useEffect(() => { endRef.current?.scrollIntoView({ behavior: 'smooth' }); }, [messages]);
          useEffect(() => { if (open) inputRef.current?.focus(); }, [open]);

          const send = async () => {
            if (!input.trim() || loading) return;
            const msg = input.trim();
            setInput('');
            setMessages(prev => [...prev, { role: 'user', content: msg }]);
            setLoading(true);
            try {
              const response = await chatWithMentor(msg, messages);
              setMessages(prev => [...prev, { role: 'assistant', content: response }]);
            } catch (e) {
              setMessages(prev => [...prev, { role: 'assistant', content: 'Sorry, I had trouble processing that. Try again!' }]);
            }
            setLoading(false);
          };

          return (
            <>
              <button
                onClick={() => setOpen(v => !v)}
                className="fixed bottom-6 right-6 z-50 w-14 h-14 rounded-full flex items-center justify-center focus-ring"
                style={{
                  background: 'linear-gradient(135deg, var(--primary-from), var(--primary-to))',
                  boxShadow: '0 8px 30px -6px rgba(255,107,44,0.6), inset 0 1px 0 rgba(255,255,255,0.4)',
                  transition: 'transform 200ms',
                  transform: open ? 'rotate(45deg) scale(0.9)' : 'scale(1)',
                }}
              >
                {open
                  ? <span style={{ color: '#1a0c00', fontSize: 24, fontWeight: 700 }}>+</span>
                  : <Sparkles size={22} style={{ color: '#1a0c00' }} strokeWidth={2.4} />
                }
              </button>

              {open && (
                <div className="fixed bottom-24 right-6 z-50 w-[380px] max-h-[520px] glass rounded-2xl overflow-hidden flex flex-col animate-fade-up" style={{ animationDuration: '0.3s', border: '1px solid rgba(255,138,61,0.15)' }}>
                  <div className="px-5 py-4 flex items-center gap-3" style={{ borderBottom: '1px solid var(--border)' }}>
                    <div className="w-9 h-9 rounded-xl flex items-center justify-center" style={{ background: 'linear-gradient(135deg, rgba(255,107,44,0.2), rgba(255,184,0,0.1))', border: '1px solid rgba(255,138,61,0.25)' }}>
                      <Sparkles size={16} style={{ color: '#FFC169' }} />
                    </div>
                    <div>
                      <div className="text-sm font-semibold">Forge AI Mentor</div>
                      <div className="text-[11px] flex items-center gap-1.5" style={{ color: 'var(--text-subtle)' }}>
                        <span className="w-1.5 h-1.5 rounded-full" style={{ background: '#34D399', boxShadow: '0 0 6px rgba(52,211,153,0.8)' }} />
                        Online · ITHS Edition
                      </div>
                    </div>
                  </div>
                  <div className="flex-1 overflow-y-auto px-4 py-4 space-y-3" style={{ maxHeight: 360 }}>
                    {messages.map((m, i) => (
                      <div key={i} className={`flex ${m.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                        <div className="rounded-2xl px-4 py-2.5 text-[13px] leading-relaxed max-w-[85%]" style={m.role === 'user' ? { background: 'linear-gradient(135deg, var(--primary-from), var(--primary-to))', color: '#1a0c00' } : { background: 'rgba(255,255,255,0.04)', border: '1px solid var(--border)', color: 'var(--text)' }}>
                          {m.content}
                        </div>
                      </div>
                    ))}
                    {loading && (
                      <div className="flex justify-start">
                        <div className="rounded-2xl px-4 py-3" style={{ background: 'rgba(255,255,255,0.04)', border: '1px solid var(--border)' }}>
                          <div className="flex gap-1.5">
                            {[0, 1, 2].map(j => (
                              <span key={j} className="w-2 h-2 rounded-full" style={{ background: 'var(--text-subtle)', animation: `fadeIn 0.6s ease ${j * 0.15}s infinite alternate` }} />
                            ))}
                          </div>
                        </div>
                      </div>
                    )}
                    <div ref={endRef} />
                  </div>
                  <div className="px-4 py-3" style={{ borderTop: '1px solid var(--border)' }}>
                    <div className="flex gap-2">
                      <input
                        ref={inputRef}
                        value={input}
                        onChange={e => setInput(e.target.value)}
                        onKeyDown={e => e.key === 'Enter' && send()}
                        placeholder="Ask about careers, skills, college..."
                        className="input-minimal flex-1 py-2.5 px-3 rounded-xl text-sm focus:outline-none"
                        style={{ background: 'rgba(255,255,255,0.03)', border: '1px solid var(--border)' }}
                      />
                      <button
                        onClick={send}
                        disabled={loading || !input.trim()}
                        className="w-10 h-10 rounded-xl flex items-center justify-center focus-ring"
                        style={{
                          background: input.trim() ? 'linear-gradient(135deg, var(--primary-from), var(--primary-to))' : 'rgba(255,255,255,0.03)',
                          border: input.trim() ? 'none' : '1px solid var(--border)',
                          opacity: loading ? 0.5 : 1,
                        }}
                      >
                        <ArrowRight size={16} style={{ color: input.trim() ? '#1a0c00' : 'var(--text-subtle)' }} strokeWidth={2.5} />
                      </button>
                    </div>
                    <div className="text-[10px] mt-2 text-center" style={{ color: 'var(--text-subtle)' }}>Powered by Forge AI · Built for ITHS</div>
                  </div>
                </div>
              )}
            </>
          );
        };

        /* ── State reducer ──────────────────────────────────────────────────────────── */
        const initialState = {
          xp: 720,
          xpToNext: 1000,
          level: 4,
          streak: 7,
          currentWeek: 2,
          roadmap: MOCK_ROADMAP,
          wins: MOCK_RECENT_WINS,
        };

        const reducer = (state, action) => {
          if (action.type === "complete") {
            // Mark current week done, advance current to next, add XP, level up if needed
            const idx = state.roadmap.findIndex((w) => w.status === "current");
            if (idx === -1) return state;
            const newRoadmap = state.roadmap.map((w, i) => {
              if (i === idx) return { ...w, status: "done" };
              if (i === idx + 1) return { ...w, status: "current" };
              return w;
            });
            let xp = state.xp + action.xp;
            let level = state.level;
            let xpToNext = state.xpToNext;
            while (xp >= xpToNext) {
              xp -= xpToNext;
              level += 1;
              xpToNext = Math.round(xpToNext * 1.25);
            }
            const newWin = {
              title: state.roadmap[idx].task,
              xp: action.xp,
              when: "just now",
            };
            return {
              ...state,
              xp,
              xpToNext,
              level,
              streak: state.streak + 1,
              currentWeek: state.currentWeek + 1,
              roadmap: newRoadmap,
              wins: [newWin, ...state.wins].slice(0, 3),
            };
          }
          if (action.type === "set_goal") {
            return { ...state, goal: action.goal };
          }
          return state;
        };

        /* ── Auth / localStorage persistence ────────────────────────────────────── */
        const DB = {
          getUsers: () => JSON.parse(localStorage.getItem('forge_users') || '{}'),
          saveUsers: (u) => localStorage.setItem('forge_users', JSON.stringify(u)),
          getSession: () => JSON.parse(localStorage.getItem('forge_session') || 'null'),
          saveSession: (s) => localStorage.setItem('forge_session', JSON.stringify(s)),
          clearSession: () => localStorage.removeItem('forge_session'),
          signup: (name, email, pw) => {
            const users = DB.getUsers();
            if (users[email]) return { error: 'Account already exists' };
            users[email] = { name, email, password: pw, createdAt: Date.now() };
            DB.saveUsers(users);
            return { ok: true, user: { name, email } };
          },
          login: (email, pw) => {
            const users = DB.getUsers();
            const u = users[email];
            if (!u) return { error: 'No account found with that email' };
            if (u.password !== pw) return { error: 'Incorrect password' };
            return { ok: true, user: { name: u.name, email } };
          },
          saveData: (email, data) => {
            const all = JSON.parse(localStorage.getItem('forge_data') || '{}');
            all[email] = { ...data, savedAt: Date.now() };
            localStorage.setItem('forge_data', JSON.stringify(all));
          },
          loadData: (email) => {
            const all = JSON.parse(localStorage.getItem('forge_data') || '{}');
            return all[email] || null;
          },
        };

        /* ── Login / Signup Screen ──────────────────────────────────────────────── */
        const AuthScreen = ({ onAuth }) => {
          const [mode, setMode] = useState('login');
          const [name, setName] = useState('');
          const [email, setEmail] = useState('');
          const [pw, setPw] = useState('');
          const [error, setError] = useState('');
          const ref = useRef(null);
          useEffect(() => { ref.current?.focus(); }, [mode]);

          const submit = (e) => {
            e.preventDefault();
            setError('');
            if (mode === 'signup') {
              if (!name.trim() || !email.trim() || !pw.trim()) return setError('All fields are required');
              if (pw.length < 4) return setError('Password must be at least 4 characters');
              const r = DB.signup(name.trim(), email.trim().toLowerCase(), pw);
              if (r.error) return setError(r.error);
              DB.saveSession(r.user);
              onAuth(r.user);
            } else {
              if (!email.trim() || !pw.trim()) return setError('Email and password required');
              const r = DB.login(email.trim().toLowerCase(), pw);
              if (r.error) return setError(r.error);
              DB.saveSession(r.user);
              onAuth(r.user);
            }
          };

          return (
            <div className="min-h-screen flex items-center justify-center px-6 py-20">
              <div className="w-full max-w-md animate-fade-up">
                <div className="text-center mb-10">
                  <div className="inline-flex mb-5">
                    <div className="w-14 h-14 rounded-2xl flex items-center justify-center" style={{ background: 'linear-gradient(135deg, var(--primary-from), var(--primary-to))', boxShadow: '0 12px 36px -8px rgba(255,107,44,0.6)' }}>
                      <Hammer size={28} style={{ color: '#1a0c00' }} strokeWidth={2.4} />
                    </div>
                  </div>
                  <h1 className="font-display font-semibold tracking-tight mb-2" style={{ fontSize: 'clamp(28px, 4vw, 40px)', lineHeight: 1.05 }}>
                    {mode === 'login' ? 'Welcome back' : 'Create your account'}
                  </h1>
                  <p style={{ color: 'var(--text-muted)' }} className="text-sm">
                    {mode === 'login' ? 'Sign in to continue forging your career' : 'Start your 90-day career transformation'}
                  </p>
                </div>

                <form onSubmit={submit} className="glass top-rule rounded-3xl p-7 space-y-4">
                  {mode === 'signup' && (
                    <div>
                      <label className="text-xs uppercase tracking-widest block mb-2" style={{ color: 'var(--text-subtle)', letterSpacing: '0.18em' }}>Full Name</label>
                      <input value={name} onChange={e => setName(e.target.value)} placeholder="Your name"
                        className="input-minimal w-full py-3 px-4 rounded-xl text-sm focus:outline-none"
                        style={{ background: 'rgba(255,255,255,0.03)', border: '1px solid var(--border)' }} />
                    </div>
                  )}
                  <div>
                    <label className="text-xs uppercase tracking-widest block mb-2" style={{ color: 'var(--text-subtle)', letterSpacing: '0.18em' }}>Email</label>
                    <input ref={ref} type="email" value={email} onChange={e => setEmail(e.target.value)} placeholder="you@iths.edu"
                      className="input-minimal w-full py-3 px-4 rounded-xl text-sm focus:outline-none"
                      style={{ background: 'rgba(255,255,255,0.03)', border: '1px solid var(--border)' }} />
                  </div>
                  <div>
                    <label className="text-xs uppercase tracking-widest block mb-2" style={{ color: 'var(--text-subtle)', letterSpacing: '0.18em' }}>Password</label>
                    <input type="password" value={pw} onChange={e => setPw(e.target.value)} placeholder="••••••••"
                      className="input-minimal w-full py-3 px-4 rounded-xl text-sm focus:outline-none"
                      style={{ background: 'rgba(255,255,255,0.03)', border: '1px solid var(--border)' }} />
                  </div>
                  {error && (
                    <div className="text-sm px-4 py-2.5 rounded-xl" style={{ background: 'rgba(244,63,94,0.1)', border: '1px solid rgba(244,63,94,0.2)', color: '#F43F5E' }}>{error}</div>
                  )}
                  <PrimaryButton type="submit" large className="w-full">
                    {mode === 'login' ? 'Sign in' : 'Create account'} <ArrowRight size={16} strokeWidth={2.5} />
                  </PrimaryButton>
                </form>
                <p className="text-center text-sm mt-6" style={{ color: 'var(--text-muted)' }}>
                  {mode === 'login' ? "Don't have an account? " : 'Already have an account? '}
                  <button onClick={() => { setMode(mode === 'login' ? 'signup' : 'login'); setError(''); }}
                    className="font-medium hover:underline" style={{ color: '#FFC169' }}>
                    {mode === 'login' ? 'Sign up' : 'Sign in'}
                  </button>
                </p>
              </div>
            </div>
          );
        };

        /* ── Main App ───────────────────────────────────────────────────────────── */
        function App() {
          const [user, setUser] = useState(null);
          const [screen, setScreen] = useState("landing");
          const [state, setState] = useState(initialState);
          const [goal, setGoal] = useState("");
          const [loaded, setLoaded] = useState(false);

          useEffect(() => {
            const session = DB.getSession();
            if (session) {
              setUser(session);
              const saved = DB.loadData(session.email);
              if (saved && saved.goal) {
                setState(saved.state || initialState);
                setGoal(saved.goal);
                setScreen('dashboard');
              } else {
                setScreen('onboarding');
              }
            }
            setLoaded(true);
          }, []);

          useEffect(() => {
            if (user && goal && screen === 'dashboard') {
              DB.saveData(user.email, { state, goal });
            }
          }, [state, goal, user, screen]);

          const dispatch = useCallback((action) => {
            setState((s) => reducer(s, action));
          }, []);

          const navigate = (next) => {
            setScreen(next);
            if (next !== "landing") window.scrollTo({ top: 0, behavior: "smooth" });
          };

          const startFlow = () => navigate(user ? "onboarding" : "auth");

          const onAuth = (u) => {
            setUser(u);
            const saved = DB.loadData(u.email);
            if (saved && saved.goal) {
              setState(saved.state || initialState);
              setGoal(saved.goal);
              navigate('dashboard');
            } else {
              navigate('onboarding');
            }
          };

          const signOut = () => {
            DB.clearSession();
            setUser(null);
            setState(initialState);
            setGoal('');
            navigate('landing');
          };

          const onGoalSubmit = (g) => { setGoal(g); navigate("forging"); };
          const onForgeDone = (generatedRoadmap) => {
            if (generatedRoadmap && Array.isArray(generatedRoadmap)) {
              setState(s => ({
                ...s,
                roadmap: generatedRoadmap,
                currentWeek: 1,
                wins: [
                  { title: 'Set your goal: "' + goal + '"', xp: 50, when: 'just now' },
                  ...s.wins.slice(0, 2),
                ],
                xp: s.xp + 50,
              }));
            }
            navigate("dashboard");
          };

          if (!loaded) return null;

          return (
            <>
              <GlobalStyles />
              <AmbientBackground />
              <div key={screen} className="animate-fade-in">
                {screen === "landing" && <Landing onStart={startFlow} />}
                {screen === "auth" && <AuthScreen onAuth={onAuth} />}
                {screen === "onboarding" && <Onboarding onSubmit={onGoalSubmit} />}
                {screen === "forging" && <ForgingLoader goal={goal} onDone={onForgeDone} />}
                {screen === "dashboard" && (
                  <Dashboard state={state} dispatch={dispatch} onNav={navigate} goal={goal} user={user} signOut={signOut} />
                )}
                {screen === "portfolio" && <Portfolio onNav={navigate} state={state} user={user} signOut={signOut} />}
                {screen === "roadmap" && <Roadmap onNav={navigate} state={state} user={user} signOut={signOut} />}
                {screen === "leaderboard" && <Leaderboard onNav={navigate} state={state} user={user} signOut={signOut} />}
              </div>
              {screen !== 'landing' && screen !== 'onboarding' && screen !== 'forging' && screen !== 'auth' && <ChatPanel />}
            </>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
